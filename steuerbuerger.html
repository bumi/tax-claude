<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steuerbürger — Wohin fließt dein Gehalt?</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080a0d;
  --bg2: #0f1217;
  --bg3: #161b22;
  --border: rgba(255,255,255,0.08);
  --text: #eee8dd;
  --text-dim: #7a7a7a;
  --red: oklch(0.60 0.22 22);
  --red2: oklch(0.55 0.20 35);
  --red3: oklch(0.50 0.18 50);
  --red4: oklch(0.62 0.14 60);
  --green: oklch(0.68 0.18 142);
  --gold: oklch(0.75 0.14 75);
  --blue: oklch(0.65 0.15 250);
  --mono: 'DM Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
}
html { scroll-behavior: smooth; background: var(--bg); color: var(--text); font-family: var(--sans); }
body { overflow-x: hidden; }

/* NAV DOTS */
.nav-dots { position: fixed; right: 24px; top: 50%; transform: translateY(-50%); z-index: 100; display: flex; flex-direction: column; gap: 10px; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: all 0.3s; }
.nav-dot.active { background: var(--text); transform: scale(1.3); }
.nav-dot:hover { background: rgba(255,255,255,0.4); }

/* SECTIONS */
section { min-height: 100vh; padding: 80px 60px; display: flex; flex-direction: column; justify-content: center; position: relative; border-bottom: 1px solid var(--border); }
.section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
h1 { font-size: clamp(48px, 7vw, 96px); font-weight: 700; line-height: 0.95; letter-spacing: -0.03em; }
h2 { font-size: clamp(32px, 4vw, 56px); font-weight: 600; line-height: 1.0; letter-spacing: -0.02em; margin-bottom: 40px; }
.mono { font-family: var(--mono); }
.red { color: var(--red); }
.green { color: var(--green); }
.dim { color: var(--text-dim); }

/* HERO */
#hero { background: var(--bg); }
.hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; margin-top: 60px; }
.salary-input-wrap { display: flex; flex-direction: column; gap: 24px; }
.salary-display { font-family: var(--mono); font-size: 64px; font-weight: 500; letter-spacing: -0.02em; color: var(--text); border-bottom: 2px solid var(--border); padding-bottom: 16px; display: flex; align-items: baseline; gap: 12px; }
.salary-display input[type=number] { font-family: var(--mono); font-size: 64px; font-weight: 500; background: none; border: none; color: var(--text); width: 280px; outline: none; letter-spacing: -0.02em; -moz-appearance: textfield; }
.salary-display input[type=number]::-webkit-outer-spin-button,
.salary-display input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
.salary-unit { font-size: 28px; color: var(--text-dim); font-weight: 300; }
input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--text); cursor: pointer; transition: transform 0.15s; }
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
.salary-hints { display: flex; gap: 8px; flex-wrap: wrap; }
.hint-btn { padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-family: var(--sans); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.hint-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
.hint-btn.active { border-color: var(--text); color: var(--text); }

/* BIG BAR */
.big-bar-wrap { display: flex; flex-direction: column; gap: 12px; }
.big-bar { height: 64px; border-radius: 8px; overflow: hidden; display: flex; position: relative; }
.bar-seg { height: 100%; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: default; }
.bar-seg:hover { filter: brightness(1.15); }
.bar-seg-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; color: rgba(0,0,0,0.7); font-weight: 500; white-space: nowrap; padding: 0 8px; }
.bar-legend { display: flex; flex-direction: column; gap: 6px; }
.legend-row { display: flex; align-items: center; justify-content: space-between; }
.legend-left { display: flex; align-items: center; gap: 10px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.legend-label { font-size: 13px; color: var(--text-dim); }
.legend-amount { font-family: var(--mono); font-size: 15px; color: var(--text); }
.legend-pct { font-family: var(--mono); font-size: 12px; color: var(--text-dim); margin-left: 6px; }

/* SHOCKING STAT */
.shocking { margin-top: 48px; padding: 32px; background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); }
.shocking-number { font-family: var(--mono); font-size: 72px; font-weight: 500; color: var(--red); letter-spacing: -0.03em; line-height: 1; }
.shocking-sub { font-size: 16px; color: var(--text-dim); margin-top: 8px; line-height: 1.5; }
.shocking-sub strong { color: var(--text); }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; margin-top: 32px; }
.stat-card { background: var(--bg2); padding: 16px 14px; }
.stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; font-family: var(--mono); }
.stat-value { font-family: var(--mono); font-size: 22px; font-weight: 500; }
.stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* TAX BREAKDOWN SECTION */
#breakdown { background: var(--bg); }
.breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
.waterfall { display: flex; flex-direction: column; gap: 4px; }
.wf-row { display: flex; align-items: center; gap: 12px; }
.wf-label { font-size: 13px; color: var(--text-dim); width: 180px; flex-shrink: 0; text-align: right; }
.wf-bar-wrap { flex: 1; height: 36px; background: var(--bg3); border-radius: 4px; overflow: hidden; position: relative; }
.wf-bar { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; padding-left: 10px; }
.wf-value { font-family: var(--mono); font-size: 13px; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
.wf-divider { height: 1px; background: var(--border); margin: 8px 0; }
.wf-total-row { display: flex; align-items: center; gap: 12px; font-weight: 600; }
.wf-total-label { font-size: 14px; width: 180px; flex-shrink: 0; text-align: right; }

/* MARGINAL RATE CHART */
.marginal-chart { background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); padding: 28px; }
.chart-title { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; font-family: var(--mono); }
svg text { font-family: var(--mono); }

/* GOVT SPENDING */
#spending { background: var(--bg); }
.spending-intro { font-size: 18px; color: var(--text-dim); margin-bottom: 40px; max-width: 600px; line-height: 1.6; }
.spending-intro strong { color: var(--text); }
.treemap-wrap { display: grid; gap: 3px; border-radius: 10px; overflow: hidden; margin-bottom: 40px; }
.tm-cell { padding: 16px; cursor: default; transition: filter 0.2s; position: relative; overflow: hidden; }
.tm-cell:hover { filter: brightness(1.12); }
.tm-cell-name { font-size: 13px; font-weight: 600; color: rgba(0,0,0,0.8); line-height: 1.3; }
.tm-cell-amount { font-family: var(--mono); font-size: 15px; color: rgba(0,0,0,0.7); margin-top: 4px; }
.tm-cell-pct { font-family: var(--mono); font-size: 22px; font-weight: 500; color: rgba(0,0,0,0.6); }
.personal-share { background: var(--bg2); border-radius: 12px; padding: 28px; border: 1px solid var(--border); }
.personal-title { font-size: 14px; color: var(--text-dim); font-family: var(--mono); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.1em; }
.ps-rows { display: flex; flex-direction: column; gap: 10px; }
.ps-row { display: flex; align-items: center; justify-content: space-between; }
.ps-label { font-size: 14px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
.ps-dot { width: 8px; height: 8px; border-radius: 50%; }
.ps-amount { font-family: var(--mono); font-size: 15px; }

/* VAT SECTION */
#vat { background: var(--bg); }
.vat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
.spend-slider-wrap { display: flex; flex-direction: column; gap: 20px; }
.spend-label { font-size: 15px; color: var(--text-dim); }
.spend-label strong { color: var(--text); }
.vat-flow { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
.vat-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-radius: 8px; background: var(--bg2); border: 1px solid var(--border); }
.vat-row-label { font-size: 14px; }
.vat-row-value { font-family: var(--mono); font-size: 16px; }
.vat-big { padding: 24px 28px; border-radius: 12px; background: rgba(232,65,42,0.12); border: 1px solid rgba(232,65,42,0.3); }
.vat-total-taken { font-family: var(--mono); font-size: 48px; font-weight: 500; color: var(--red); margin-bottom: 8px; }
.vat-comparison { display: flex; flex-direction: column; gap: 24px; }
.true-rate { text-align: center; padding: 40px; background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); }
.true-rate-number { font-family: var(--mono); font-size: 96px; font-weight: 500; color: var(--red); line-height: 1; }
.true-rate-label { font-size: 16px; color: var(--text-dim); margin-top: 12px; }
.euro-grid { display: grid; grid-template-columns: repeat(20, 1fr); gap: 2px; margin-top: 12px; max-width: 320px; }
.euro-cell { aspect-ratio: 1; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 8px; }

/* SAVINGS SECTION */
#geldfluss { background: var(--bg); }
#savings { background: var(--bg); }
#inflation { background: var(--bg); }
#opportunity { background: var(--bg); }
#rethink { background: var(--bg); }
#actions { background: var(--bg); }
.savings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
.savings-controls { display: flex; flex-direction: column; gap: 24px; }
.ctrl-row { display: flex; flex-direction: column; gap: 8px; }
.ctrl-label { display: flex; justify-content: space-between; font-size: 14px; }
.ctrl-name { color: var(--text-dim); }
.ctrl-value { font-family: var(--mono); color: var(--text); }
.savings-breakdown { background: var(--bg2); border-radius: 12px; padding: 24px; border: 1px solid var(--border); margin-top: 24px; }
.chart-wrap { background: var(--bg2); border-radius: 12px; padding: 28px; border: 1px solid var(--border); }
.chart-legend { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
.cl-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); }
.cl-line { width: 24px; height: 2px; border-radius: 1px; }
.final-erosion { padding: 20px; background: rgba(232,65,42,0.08); border-radius: 8px; border: 1px solid rgba(232,65,42,0.2); margin-top: 16px; }
.erosion-number { font-family: var(--mono); font-size: 36px; color: var(--red); }
.erosion-label { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

/* FOOTER */
.footer { padding: 40px 60px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.footer-note { font-size: 12px; color: var(--text-dim); max-width: 600px; line-height: 1.7; }
.footer-year { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }

/* SCROLL INDICATOR */
.scroll-hint { position: absolute; bottom: 32px; left: 60px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.15em; display: flex; align-items: center; gap: 12px; }
.scroll-hint::after { content: ''; display: block; width: 40px; height: 1px; background: var(--border); }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes welcomeFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes welcomeCardIn { from { opacity: 0; transform: translateY(40px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes welcomeFadeOut { to { opacity: 0; pointer-events: none; } }
.fade-in { animation: fadeInUp 0.6s ease forwards; }

/* ── RESPONSIVE ─────────────────────────────────────────── */
.resp-grid { display: grid; }

@media (max-width: 900px) {
  section { padding: 60px 28px; min-height: auto; }
  .hero-grid { grid-template-columns: 1fr; gap: 40px; }
  .breakdown-grid { grid-template-columns: 1fr; gap: 32px; }
  .vat-grid { grid-template-columns: 1fr; gap: 32px; }
  .savings-grid { grid-template-columns: 1fr; gap: 32px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .wf-label { width: 140px; font-size: 11px; }
  .wf-total-label { width: 140px; font-size: 12px; }
  .footer { padding: 32px 28px; flex-direction: column; gap: 16px; align-items: flex-start; }
  .footer-note { max-width: 100%; }
  .scroll-hint { left: 28px; }
  .nav-dots { right: 10px; gap: 8px; }
  .nav-dot { width: 6px; height: 6px; }
  /* Inline grids: force 1-col on tablet */
  .resp-grid { grid-template-columns: 1fr !important; }
  .resp-grid-2 { grid-template-columns: 1fr 1fr !important; }
}
@media (max-width: 600px) {
  section { padding: 48px 16px; }
  h2 { margin-bottom: 24px; }
  .hero-grid { gap: 28px; margin-top: 32px; }
  .salary-display { font-size: 40px; }
  .salary-display input[type=number] { font-size: 40px; width: 180px; }
  .salary-unit { font-size: 20px; }
  .shocking { padding: 20px; margin-top: 28px; }
  .shocking-number { font-size: 48px; }
  .big-bar { height: 48px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .stat-card { padding: 12px 10px; }
  .stat-value { font-size: 18px; }
  .stat-label { font-size: 9px; }
  .breakdown-grid { gap: 24px; }
  .wf-row { gap: 6px; }
  .wf-label { width: 110px; font-size: 10px; }
  .wf-total-label { width: 110px; font-size: 11px; }
  .wf-bar-wrap { height: 28px; }
  .wf-value { font-size: 11px; right: 4px; }
  .marginal-chart { padding: 16px; }
  .true-rate-number { font-size: 64px; }
  .true-rate { padding: 24px 16px; }
  .euro-grid { grid-template-columns: repeat(20, 1fr); gap: 1px; }
  .savings-controls { gap: 16px; }
  .savings-breakdown { padding: 16px; }
  .chart-wrap { padding: 16px; }
  .chart-legend { gap: 10px; }
  .cl-item { font-size: 10px; }
  .personal-share { padding: 16px; }
  .footer { padding: 24px 16px; }
  .scroll-hint { left: 16px; bottom: 20px; }
  .nav-dots { display: none; }
  .spending-intro { font-size: 15px; }
  .tm-cell { padding: 10px; min-width: 60px !important; }
  .tm-cell-pct { font-size: 16px; }
  .tm-cell-name { font-size: 11px; }
  .tm-cell-amount { font-size: 12px; }
  .resp-grid, .resp-grid-2 { grid-template-columns: 1fr !important; }
  .resp-grid-2col { grid-template-columns: 1fr 1fr !important; }
  svg { max-width: 100%; }
}
</style>

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── GERMAN TAX MATH 2024 (Steuerfortentwicklungsgesetz) ─────────────────────
// Source: EStG §32a (2024), lohn-info.de/einkommensteuertarif_2024.html
function calcIncomeTax(annual) {
  if (annual <= 11784) return 0;
  if (annual <= 17005) {
    const y = (annual - 11784) / 10000;
    return Math.round((954.80 * y + 1400) * y);
  }
  if (annual <= 66760) {
    const z = (annual - 17005) / 10000;
    return Math.round((181.19 * z + 2397) * z + 991.21);
  }
  if (annual <= 277825) return Math.round(0.42 * annual - 10636.31);
  return Math.round(0.45 * annual - 18971.06);
}

// Source: lohn-info.de/sozialversicherungsbeitraege2024.html
function calcSocial(annual) {
  const kvCap = 62100, rvCap = 90600;
  const kv = Math.min(annual, kvCap) * 0.0815; // 7.3% + 0.85% avg. Zusatzbeitrag (1,7%/2)
  const pv = Math.min(annual, kvCap) * 0.023;  // 1.7% + 0.6% Kinderlosenzuschlag
  const rv = Math.min(annual, rvCap) * 0.093;
  const av = Math.min(annual, rvCap) * 0.013;
  return Math.round(kv + pv + rv + av);
}

// Arbeitgeberanteil: same BBG caps, but PV without Kinderlosenzuschlag
function calcEmployerSocial(annual) {
  const kvCap = 62100, rvCap = 90600;
  const kv = Math.min(annual, kvCap) * 0.0815; // 7.3% + 0.85% avg. Zusatzbeitrag (1,7%/2)
  const pv = Math.min(annual, kvCap) * 0.017;  // 1.7% (kein Kinderlosenzuschlag)
  const rv = Math.min(annual, rvCap) * 0.093;
  const av = Math.min(annual, rvCap) * 0.013;
  return Math.round(kv + pv + rv + av);
}

function calcAll(monthly) {
  const g = monthly * 12;
  const it = calcIncomeTax(g);
  // Soli: Freigrenze 18.130 €, Milderungszone bis ~33.710 €, darüber 5,5%
  // Source: §4 SolZG, haufe.de/solidaritaetszuschlag-milderungszone
  const soli = it <= 18130 ? 0
    : Math.round(Math.min(it * 0.055, 0.119 * (it - 18130)));
  const soc = calcSocial(g);
  const empSoc = calcEmployerSocial(g);
  const net = g - it - soli - soc;
  const laborCost = g + empSoc; // What the employer actually pays
  return {
    gross: monthly,
    incomeTax: Math.round(it / 12),
    soli: Math.round(soli / 12),
    social: Math.round(soc / 12),
    employerSocial: Math.round(empSoc / 12),
    laborCost: Math.round(laborCost / 12),
    net: Math.round(net / 12),
    annualGross: g, annualIT: it, annualSoli: soli, annualSocial: soc, annualNet: net,
    annualEmployerSocial: empSoc, annualLaborCost: laborCost,
    effectiveRate: ((it + soli + soc) / g * 100),
    totalStateRate: ((it + soli + soc + empSoc) / laborCost * 100), // vs. labor cost
    marginalRate: calcMarginal(g),
  };
}

function calcMarginal(annual) {
  if (annual <= 11784) return 0;
  if (annual <= 17005) { const y=(annual-11784)/10000; return Math.min(100,(954.80*2*y+1400)/100); }
  if (annual <= 66760) { const z=(annual-17005)/10000; return Math.min(100,(181.19*2*z+2397)/100); }
  if (annual <= 277825) return 42;
  return 45;
}

function fmt(n, digits=0) {
  return new Intl.NumberFormat('de-DE', { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(n);

function BigBar({ taxes }) {
  const { laborCost, employerSocial, incomeTax, soli, social, net } = taxes;
  const base = laborCost;
  const segs = [
    { label: "AG-Sozialabgaben", amount: employerSocial, color: "var(--red4)", pct: employerSocial/base*100 },
    { label: "Einkommensteuer", amount: incomeTax, color: "var(--red)", pct: incomeTax/base*100 },
    { label: "Sozialabgaben (AN)", amount: social, color: "var(--red2)", pct: social/base*100 },
    ...(soli > 0 ? [{ label: "Soli", amount: soli, color: "var(--red3)", pct: soli/base*100 }] : []),
    { label: "Netto", amount: net, color: "var(--green)", pct: net/base*100 },
  ];
  return (
    <div className="big-bar-wrap">
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6, fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--text-dim)' }}>
        <span>Arbeitskosten: {fmt(laborCost)} €</span>
        <span style={{ color: 'var(--green)' }}>Netto: {fmt(net)} € ({(net/base*100).toFixed(1)}%)</span>
      </div>
      <div className="big-bar">
        {segs.map((s, i) => (
          <div
            key={i}
            className="bar-seg"
            style={{ width: `${s.pct}%`, background: s.color }}
            title={`${s.label}: ${fmt(s.amount)}€ (${s.pct.toFixed(1)}%)`}
          >
            {s.pct > 8 && (
              <span className="bar-seg-label" style={{ color: i < segs.length-1 ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.7)' }}>
                {s.pct.toFixed(0)}%
              </span>
            )}
          </div>
        ))}
      </div>
      <div className="bar-legend">
        {segs.map((s, i) => (
          <div className="legend-row" key={i}>
            <div className="legend-left">
              <div className="legend-dot" style={{ background: s.color }} />
              <span className="legend-label">{s.label}</span>
            </div>
            <div>
              <span className="legend-amount">{fmt(s.amount)} €</span>
              <span className="legend-pct">{s.pct.toFixed(1)}%</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function MarginalChart({ monthly }) {
  const w = 380, h = 220, pad = { top: 16, right: 20, bottom: 40, left: 44 };
  const maxSal = 20000;
  const points = [];
  for (let m = 0; m <= maxSal; m += 200) {
    const a = m * 12;
    points.push({ x: m, y: calcMarginal(a) + (calcSocial(Math.min(a,90600*1.01)) / Math.max(a,1) * 100) });
  }
  const xScale = v => pad.left + (v / maxSal) * (w - pad.left - pad.right);
  const yScale = v => pad.top + (1 - v / 70) * (h - pad.top - pad.bottom);
  const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(p.x)},${yScale(p.y)}`).join(' ');
  const curX = xScale(monthly);
  const curY = yScale(points.find(p => p.x >= monthly)?.y || 0);
  return (
    <div className="marginal-chart">
      <div className="chart-title">GRENZBELASTUNG NACH EINKOMMEN (STEUER + SOZIAL)</div>
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ overflow: 'visible' }}>
        <defs>
          <linearGradient id="mgGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--red)" stopOpacity="0.3" />
            <stop offset="100%" stopColor="var(--red)" stopOpacity="0.02" />
          </linearGradient>
        </defs>
        {[0, 20, 40, 60].map(v => (
          <g key={v}>
            <line x1={pad.left} x2={w-pad.right} y1={yScale(v)} y2={yScale(v)} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />
            <text x={pad.left - 6} y={yScale(v) + 4} fill="#555" fontSize="10" textAnchor="end">{v}%</text>
          </g>
        ))}
        {[0, 5000, 10000, 15000, 20000].map(v => (
          <text key={v} x={xScale(v)} y={h - 6} fill="#555" fontSize="10" textAnchor="middle">{v >= 1000 ? `${v/1000}k` : v}</text>
        ))}
        <path d={`${path} L${xScale(maxSal)},${yScale(0)} L${xScale(0)},${yScale(0)} Z`} fill="url(#mgGrad)" />
        <path d={path} fill="none" stroke="var(--red)" strokeWidth="2" />
        <line x1={curX} x2={curX} y1={pad.top} y2={h - pad.bottom} stroke="var(--text)" strokeWidth="1" strokeDasharray="4,3" opacity="0.5" />
        <circle cx={curX} cy={curY} r="5" fill="var(--text)" />
        <text x={curX + 7} y={curY - 8} fill="var(--text)" fontSize="11">du</text>
      </svg>
      <div style={{ marginTop: 12, fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.6 }}>
        Zur Veranschaulichung werden hier Steuern und Sozialabgaben zusammen dargestellt. Sozialabgaben sind keine Steuern im engeren Sinne — sie fließen in soziale Absicherung (Rente, Arbeitslosigkeit) und das Gesundheitssystem (Kranken- und Pflegeversicherung).
        Ab ca. 5.200 €/Mo. sinkt die Kurve wieder: Sozialabgaben sind bei der Beitragsbemessungsgrenze gedeckelt (KV/PV: 62.100 €, RV/AV: 90.600 €/Jahr). Wer mehr verdient, zahlt prozentual weniger Sozialabgaben — <strong style={{ color: 'var(--text)' }}>Gutverdiener werden relativ entlastet</strong>.
      </div>
    </div>
  );
}

function SpendingModal({ cat, taxes, onClose }) {

  const annualShare = Math.round(taxes.annualIT * 0.425 + taxes.annualSoli) * cat.pct / 100; // Bundesanteil
  const monthlyShare = annualShare / 12;

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);

  return (
    <div
      style={{ position: 'fixed', inset: 0, zIndex: 1000, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}

function SpendingTreemap({ taxes, onSelect }) {
  const ann = Math.round(taxes.annualIT * 0.425 + taxes.annualSoli); // Bundesanteil: 42,5% ESt + 100% Soli
  const rows = [
    { cols: SPENDING.slice(0, 4) },
    { cols: SPENDING.slice(4, 7) },
    { cols: SPENDING.slice(7) },
  ];
  const share = (pct) => (ann * pct / 100);
  return (
    <div>
      <div style={{ fontSize: 12, color: 'var(--text-dim)', fontFamily: 'var(--mono)', marginBottom: 10, letterSpacing: '0.05em' }}>
        ↓ Klicke auf eine Kategorie für Details

      <div style={{ display: 'flex', flexDirection: 'column', gap: 3, marginBottom: 32 }}>
        {rows.map((row, ri) => (
          <div key={ri} style={{ display: 'flex', gap: 3 }}>
            {row.cols.map((cat, ci) => (
              <div
                key={ci}
                className="tm-cell"
                style={{ background: cat.color, flex: cat.pct, minWidth: 80, cursor: 'pointer' }}
                onClick={() => onSelect(cat)}
                title={`${cat.name} — klicken für Details`}
              >
                <div className="tm-cell-pct">{cat.pct.toFixed(0)}%</div>
                <div className="tm-cell-name">{cat.name}</div>
                <div className="tm-cell-amount">{fmt(taxes.annualGross > 0 ? share(cat.pct) : 0, 0)} €/Jahr</div>
                <div style={{ position: 'absolute', bottom: 8, right: 10, fontSize: 10, opacity: 0.5, fontFamily: 'var(--mono)' }}>→</div>

        ))}

              return (

function SavingsChart({ taxes }) {
  const [savePct, setSavePct] = useState(20);
  const [years, setYears] = useState(20);
  const [interest, setInterest] = useState(5);
  const [inflation, setInflation] = useState(2);
  const [dynamic, setDynamic] = useState(false);

  const monthlySaving = taxes.net * savePct / 100;
  const annualSaving = monthlySaving * 12;

  const CGT_RATE = 0.26375; // Abgeltungssteuer + Soli
  const FREIBETRAG = 1000; // annual

  const points = Array.from({ length: years + 1 }, (_, yr) => {
    let nominal = 0;
    let principal = 0;
    for (let y = 0; y < yr; y++) {
      const contribution = dynamic ? annualSaving * Math.pow(1 + inflation / 100, y) : annualSaving;
      principal += contribution;
      nominal = (nominal + contribution) * (1 + interest / 100);
    }
    const real = nominal / Math.pow(1 + inflation / 100, yr);
    const gains = Math.max(0, nominal - principal);
    const taxableGains = Math.max(0, gains - FREIBETRAG);
    const afterTax = nominal - taxableGains * CGT_RATE;
    const afterTaxReal = afterTax / Math.pow(1 + inflation / 100, yr);
    return { yr, nominal, real, afterTax, afterTaxReal, principal };
  });

  const maxVal = points[points.length - 1].nominal;
  const w = 560, h = 260, pad = { top: 20, right: 20, bottom: 40, left: 60 };
  const xS = yr => pad.left + (yr / years) * (w - pad.left - pad.right);
  const yS = v => pad.top + (1 - v / maxVal) * (h - pad.top - pad.bottom);
  const line = (key) => points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xS(p.yr)},${yS(p[key])}`).join(' ');
  const last = points[points.length - 1];

  const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => Math.round(maxVal * f / 1000) * 1000);

  return (
    <div className="savings-grid">
      <div className="savings-controls">
        <div className="ctrl-row">
          <div className="ctrl-label">
            <span className="ctrl-name">Sparrate</span>
            <span className="ctrl-value mono">{savePct}% → {fmt(monthlySaving)} €/Mo.</span>
          </div>
          <input type="range" min="0" max="60" value={savePct} onChange={e => setSavePct(+e.target.value)} />
        </div>
        <div className="ctrl-row">
          <div className="ctrl-label">
            <span className="ctrl-name">Spardauer</span>
            <span className="ctrl-value mono">{years} Jahre</span>
          </div>
          <input type="range" min="1" max="40" value={years} onChange={e => setYears(+e.target.value)} />
        </div>
        <div className="ctrl-row">
          <div className="ctrl-label">
            <span className="ctrl-name">Rendite (nominal)</span>
            <span className="ctrl-value mono">{interest}% / Jahr</span>
          </div>
          <input type="range" min="0" max="12" step="0.5" value={interest} onChange={e => setInterest(+e.target.value)} />
        </div>
        <div className="ctrl-row">
          <div className="ctrl-label">
            <span className="ctrl-name">Inflation</span>
            <span className="ctrl-value mono">{inflation}% / Jahr</span>
          </div>
          <input type="range" min="0" max="8" step="0.5" value={inflation} onChange={e => setInflation(+e.target.value)} />
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '4px 0 8px' }}>
          <button onClick={() => setDynamic(!dynamic)} style={{
            width: 44, height: 24, borderRadius: 12, border: 'none', cursor: 'pointer', position: 'relative',
            background: dynamic ? 'var(--green)' : 'rgba(255,255,255,0.1)', transition: 'background 0.2s',
          }}>
            <div style={{
              width: 18, height: 18, borderRadius: '50%', background: 'var(--text)',
              position: 'absolute', top: 3, left: dynamic ? 23 : 3, transition: 'left 0.2s',
            }} />
          </button>
          <span style={{ fontSize: 13, color: dynamic ? 'var(--text)' : 'var(--text-dim)', transition: 'color 0.2s' }}>
            Dynamik: Sparrate steigt jährlich um Inflation
          </span>
        </div>
        <div className="savings-breakdown">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {dynamic && (
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14 }}>
                <span style={{ color: 'var(--text-dim)' }}>Eingezahlt (heutige Kaufkraft)</span>
                <span className="mono">{fmt(annualSaving * years)} €</span>
              </div>
            )}
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: dynamic ? 12 : 14, color: dynamic ? 'var(--text-dim)' : undefined }}>
              <span style={{ color: 'var(--text-dim)' }}>Eingezahlt{dynamic ? ' (nominal)' : ` (${years} J.)`}</span>
              <span className="mono">{fmt(last.principal)} €</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14 }}>
              <span style={{ color: 'var(--text-dim)' }}>Nominalwert</span>
              <span className="mono">{fmt(last.nominal)} €</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14, borderTop: '1px solid var(--border)', paddingTop: 12 }}>
              <span style={{ color: 'var(--red)' }}>− Abgeltungssteuer (26,375%)</span>
              <span className="mono red">− {fmt(last.nominal - last.afterTax)} €</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14 }}>
              <span style={{ color: 'var(--red)' }}>− Inflation ({inflation}%/J.)</span>
              <span className="mono red">− {fmt(last.afterTax - last.afterTaxReal)} €</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 16, borderTop: '1px solid var(--border)', paddingTop: 12, fontWeight: 600 }}>
              <span className="green">Reale Kaufkraft</span>
              <span className="mono green">{fmt(last.afterTaxReal)} €</span>
            </div>
            {dynamic && (() => {
              const realGain = last.afterTaxReal - annualSaving * years;
              const isPos = realGain >= 0;
              return (
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: isPos ? 'var(--green)' : 'var(--red)', marginTop: -4 }}>
                  <span>{isPos ? 'Realer Gewinn' : 'Realer Verlust'}</span>
                  <span className="mono">{isPos ? '+' : '−'} {fmt(Math.abs(realGain))} €</span>
                </div>
              );
            })()}
          </div>
          <div className="final-erosion" style={{ marginTop: 20 }}>
            <div className="erosion-number">
              {last.afterTaxReal > 0 && last.principal > 0
                ? dynamic
                  ? `${last.afterTaxReal >= annualSaving * years ? '+' : ''}${((last.afterTaxReal / (annualSaving * years) - 1) * 100).toFixed(0)}%`
                  : `${((1 - last.afterTaxReal / last.nominal) * 100).toFixed(0)}%`
                : '—'}
            </div>
            <div className="erosion-label">
              {dynamic
                ? 'realer Kaufkraftgewinn nach Steuern + Inflation'
                : 'deines nominalen Vermögens werden durch Steuern + Inflation aufgezehrt'}
            </div>
          </div>
          <div style={{ marginTop: 16, padding: '14px 18px', background: 'var(--bg3)', borderRadius: 10, border: '1px solid var(--border)', fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.7 }}>
            <strong style={{ color: 'var(--text)' }}>Was bedeutet das?</strong> Um nach Abgeltungssteuer und Inflation überhaupt die Kaufkraft zu erhalten, muss deine Bruttorendite deutlich über der Inflationsrate liegen — nur um bei Null rauszukommen. Alles darunter bedeutet: dein Geld verliert real an Wert, obwohl es nominal wächst.
            Dreh an den Reglern oben und beobachte die <span className="green" style={{ fontWeight: 600 }}>Reale Kaufkraft</span> — du wirst sehen, wie schwer es ist, durch Sparen und Investieren tatsächlich Vermögen aufzubauen.
          </div>
        </div>
      </div>
      <div className="chart-wrap">
        <div className="chart-title" style={{ marginBottom: 12, fontSize: 13, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>
          VERMÖGENSENTWICKLUNG ÜBER {years} JAHRE
        </div>
        <div className="chart-legend">
          <div className="cl-item"><div className="cl-line" style={{ background: 'var(--text)', opacity: 0.4 }} />Eingezahlt</div>
          <div className="cl-item"><div className="cl-line" style={{ background: 'var(--gold)' }} />Nominalwert</div>
          <div className="cl-item"><div className="cl-line" style={{ background: 'var(--blue)' }} />Nach Abgeltungssteuer</div>
          <div className="cl-item"><div className="cl-line" style={{ background: 'var(--green)' }} />Reale Kaufkraft</div>
          <div className="cl-item"><div className="cl-line" style={{ background: 'var(--red)', opacity: 0.6 }} />Verlust durch Staat+Inflation</div>
        </div>
        <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ overflow: 'visible' }}>
          <defs>
            <linearGradient id="nomGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--gold)" stopOpacity="0.15" />
              <stop offset="100%" stopColor="var(--gold)" stopOpacity="0" />
            </linearGradient>
            <linearGradient id="realGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--green)" stopOpacity="0.2" />
              <stop offset="100%" stopColor="var(--green)" stopOpacity="0" />
            </linearGradient>
          </defs>
          {yTicks.map((v, i) => (
            <g key={i}>
              <line x1={pad.left} x2={w - pad.right} y1={yS(v)} y2={yS(v)} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />
              <text x={pad.left - 6} y={yS(v) + 4} fill="#555" fontSize="10" textAnchor="end">
                {v >= 1000000 ? `${(v/1000000).toFixed(1)}M` : v >= 1000 ? `${(v/1000).toFixed(0)}k` : v}
              </text>
            </g>
          ))}
          {Array.from({ length: years + 1 }, (_, i) => i).filter(y => y % Math.ceil(years/6) === 0).map(y => (
            <text key={y} x={xS(y)} y={h - 6} fill="#555" fontSize="10" textAnchor="middle">{y}J</text>
          ))}
          {/* Gap fill between nominal and real */}
          <path
            d={`${line('nominal')} L${xS(years)},${yS(last.afterTaxReal)} ${[...points].reverse().map((p,i)=>`${i===0?'M':'L'}${xS(p.yr)},${yS(p.afterTaxReal)}`).join(' ')} Z`}
            fill="var(--red)" opacity="0.08"
          />
          {/* Nominal area */}
          <path d={`${line('nominal')} L${xS(years)},${yS(0)} L${xS(0)},${yS(0)} Z`} fill="url(#nomGrad)" />
          {/* Real area */}
          <path d={`${line('afterTaxReal')} L${xS(years)},${yS(0)} L${xS(0)},${yS(0)} Z`} fill="url(#realGrad)" />
          {/* Principal line */}
          <path d={line('principal')} fill="none" stroke="var(--text)" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.4" />
          {/* Nominal line */}
          <path d={line('nominal')} fill="none" stroke="var(--gold)" strokeWidth="2.5" />
          {/* After tax line */}
          <path d={line('afterTax')} fill="none" stroke="var(--blue)" strokeWidth="2" strokeDasharray="6,3" />
          {/* Real value line */}
          <path d={line('afterTaxReal')} fill="none" stroke="var(--green)" strokeWidth="2.5" />
        </svg>
      </div>
    </div>
  );
}

function OutlookSection({ taxes }) {
  const employed = 45_000_000;
  const annualTax = taxes.annualIT + taxes.annualSoli;
  // EU net contribution: ~13.1 Mrd. / 45M employed = ~291€/year per worker
  // Source: Bundesbank Monatsbericht EU-Haushalt 2024
  const euMonthly = Math.round(291 * (annualTax / (employed * 8000)) * 12) || 24;
  // Additional interest from 600Mrd new debt at ~3% = 18Mrd/year shared by ~45M workers
  // Source: Bundesbank Bund yield data 2024/2025, ~2.5–3% on 10Y Bunds
  const additionalInterestMonthly = Math.round((600_000_000_000 * 0.03 / employed / 12) * (annualTax / 48000));
  // EU Sonderprogramme: DE-Anteil ~25% von ~1.097 Mrd. = ~274 Mrd. über ~30 Jahre
  // = ~9.1 Mrd/Jahr + Zinsen (~3% auf ~500 Mrd. Ø-Schuldenstand) = ~15 Mrd. DE-Anteil: ~3.75 Mrd.
  // Gesamt DE-Belastung: ~9.1 + 3.75 = ~12.9 Mrd./Jahr, verteilt auf 45M Erwerbstätige
  const euSonderJahr = 12_900_000_000; // ~12.9 Mrd. DE-Anteil/Jahr (Tilgung + Zinsen)
  const euSonderMonthly = Math.round((euSonderJahr / employed / 12) * (annualTax / 48000)) || 0;
  const euTotalMonthly = euMonthly + euSonderMonthly;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 60 }}>

      {/* SONDERVERMÖGEN */}
      <div>
        <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--text-dim)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 20 }}>

                <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: sv.statusColor, textTransform: 'uppercase', letterSpacing: '0.1em' }}>{sv.status}</div>

                <div style={{ fontFamily: 'var(--mono)', fontSize: typeof sv.amount === 'number' ? 48 : 28, fontWeight: 500, color: 'var(--red)', lineHeight: 1, letterSpacing: '-0.02em' }}>
                  {typeof sv.amount === 'number' ? `${sv.amount} Mrd.` : sv.amount}
                </div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--text-dim)', marginTop: 2 }}>Euro neue Schulden</div>
              </div>
              <div style={{ fontWeight: 600, fontSize: 15, lineHeight: 1.3 }}>{sv.title}</div>
              <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.7, flexGrow: 1 }}>{sv.desc}</div>
              {typeof sv.perCapita === 'number' && (
                <div style={{ marginTop: 4, padding: '12px 16px', background: 'rgba(192,57,43,0.1)', borderRadius: 8, border: '1px solid rgba(192,57,43,0.25)' }}>

                </div>

function App() {
  const [salary, setSalary] = useState(4500);
  const [activeSection, setActiveSection] = useState(0);
  const [selectedCat, setSelectedCat] = useState(null);
  const [showWelcome, setShowWelcome] = useState(true);
  const [inclSocial, setInclSocial] = useState(false);
  const [spendPct, setSpendPct] = useState(80);
  const [oppYears, setOppYears] = useState(20);
  const [oppInterest, setOppInterest] = useState(7.5);
  const [oppInflation, setOppInflation] = useState(2);
  const [oppShowReal, setOppShowReal] = useState(false);
  const [oppDynamic, setOppDynamic] = useState(false);
  const sectionIds = ['hero', 'breakdown', 'geldfluss', 'spending', 'vat', 'hidden-taxes', 'savings', 'opportunity', 'inflation', 'outlook', 'rethink', 'actions'];

  const taxes = calcAll(salary);

  useEffect(() => {
    const handler = () => {
      const mid = window.innerHeight / 2;
      let closest = 0;
      let closestDist = Infinity;
      sectionIds.forEach((id, i) => {
        const el = document.getElementById(id);
        if (!el) return;
        const rect = el.getBoundingClientRect();
        const dist = Math.abs(rect.top + rect.height / 2 - mid);
        if (dist < closestDist) { closestDist = dist; closest = i; }
      });
      setActiveSection(closest);
    };
    window.addEventListener('scroll', handler, { passive: true });
    handler();
    return () => window.removeEventListener('scroll', handler);
  }, []);

  const totalTaken = taxes.incomeTax + taxes.soli + taxes.social;
  const takenPct = (totalTaken / taxes.gross * 100);
  const totalStateTakeFromLabor = totalTaken + taxes.employerSocial;
  const stateTakeFromLaborPct = (totalStateTakeFromLabor / taxes.laborCost * 100);

  const hints = [2500, 3500, 4500, 6000, 10000];

  return (
    <>
      {showWelcome && <WelcomePopup onEnter={() => setShowWelcome(false)} />}
      <NavDots active={activeSection} sections={sectionIds} />

      {/* SECTION 1: HERO */}
      <div style={{
        fontSize: 11, color: 'var(--text-dim)', textAlign: 'center',
        padding: '8px 24px', background: 'var(--bg2)', borderBottom: '1px solid var(--border)',
        fontFamily: 'var(--mono)', letterSpacing: '0.02em', lineHeight: 1.5,

        {(() => {

          const agKV = Math.round(Math.min(taxes.annualGross, 62100) * 0.0815 / 12);
          const agRV = Math.round(Math.min(taxes.annualGross, 90600) * 0.093 / 12);

          const anRV = Math.round(Math.min(taxes.annualGross, 90600) * 0.093 / 12);
          const anPV = Math.round(Math.min(taxes.annualGross, 62100) * 0.023 / 12);
          const anAV = Math.round(Math.min(taxes.annualGross, 90600) * 0.013 / 12);

          const soli = taxes.soli;
          const netto = taxes.net;

          const laenderESt = Math.round(est * 0.425);
          const gemeindenESt = Math.round(est * 0.15);
          const bundSoli = soli;
          const bundTotal = bundESt + bundSoli;
          const laenderTotal = laenderESt;
          const gemeindenTotal = gemeindenESt;
          const rvTotal = anRV + agRV;
          const kvTotal = anKV + agKV;
          const pvTotal = anPV + agPV;
          const avTotal = anAV + agAV;

          // Column 3: What happens to Netto (MwSt + Alltagssteuern)
          const nettoSpending = netto * spendPct / 100;
          const vatFromNetto = Math.round(nettoSpending * 19 / 119);
          // Einzelne Verbrauchsteuern & Zwangsabgaben (monatlich, Durchschnittswerte)
          const kaltmiete = Math.round(netto * 0.25); // Ø ~25% des Netto (Destatis 2022: 27,8% Bruttokaltmiete, Kaltmiete allein ~25%)
          const energiesteuer = Math.round(1080 / 12); // Autofahren: ~1.080 €/Jahr
          const versicherungsteuer = Math.round(304 / 12); // Versicherungsteuer: ~304 €/Jahr
          const rundfunk = 18; // Rundfunkbeitrag: 18,36 €/Mo pro Haushalt
          const kaffeesteuer = Math.round(16 / 12); // Kaffeesteuer: ~16 €/Jahr
          const bierSektsteuer = Math.round(16 / 12); // Bier + Sekt: ~16 €/Jahr
          const alltagsTotal = energiesteuer + versicherungsteuer + rundfunk + kaffeesteuer + bierSektsteuer;
          const verbleibt = netto - vatFromNetto - kaltmiete - alltagsTotal;

          // === SANKEY LAYOUT ===
          const w = 900, h = 520;
          const colX = [80, 260, 460, 680]; // 4 columns: source, deductions, recipients, netto-split
          const nodeW = 14;

          // Helper: layout nodes vertically with gaps
          const layoutNodes = (items, startY, availH, gap = 6) => {
            const totalVal = items.reduce((s, it) => s + it.value, 0);
            const totalGap = gap * (items.length - 1);
            const scale = (availH - totalGap) / totalVal;
            let y = startY;
            return items.map(it => {
              const height = Math.max(2, it.value * scale);
              const node = { ...it, y, height };
              y += height + gap;
              return node;
            });
          };

          // Column 0: Labor cost (single block)
          const col0 = [{ label: 'Arbeitskosten', value: total, color: 'var(--text-dim)' }];
          const nodes0 = layoutNodes(col0, 20, h - 40);

          // Column 1: Deductions breakdown
          const col1Items = [
            { label: 'AG-Krankenvers.', value: agKV, color: 'var(--red4)' },
            { label: 'AG-Rentenvers.', value: agRV, color: 'var(--red4)' },
            { label: 'AG-Pflegevers.', value: agPV, color: 'var(--red4)' },

            { label: 'AN-Krankenvers.', value: anKV, color: 'var(--red2)' },
            { label: 'AN-Rentenvers.', value: anRV, color: 'var(--red2)' },
            { label: 'AN-Pflegevers.', value: anPV, color: 'var(--red2)' },
            { label: 'AN-Arbeitslosenvers.', value: anAV, color: 'var(--red2)' },
            { label: 'Einkommensteuer', value: est, color: 'var(--red)' },
            ...(soli > 0 ? [{ label: 'Soli', value: soli, color: 'var(--red3)' }] : []),
            { label: 'Netto', value: netto, color: 'var(--green)' },
          ];
          const nodes1 = layoutNodes(col1Items, 20, h - 40);

          // Column 2: Recipients
          const col2Items = [
            { label: 'Krankenkassen', value: kvTotal, color: '#c0392b' },
            { label: 'Rentenversicherung', value: rvTotal, color: '#a93226' },
            { label: 'Pflegekassen', value: pvTotal, color: '#96281b' },
            { label: 'BA für Arbeit', value: avTotal, color: '#d35400' },
            { label: 'Bund (42,5% ESt)', value: bundTotal, color: 'var(--red)' },
            { label: 'Länder (42,5% ESt)', value: laenderTotal, color: 'var(--red3)' },
            { label: 'Gemeinden (15% ESt)', value: gemeindenTotal, color: 'var(--red4)' },
            { label: 'Du', value: netto, color: 'var(--green)' },
          ];
          const nodes2 = layoutNodes(col2Items, 20, h - 40);

          // Column 3: Netto breakdown
          const col3Items = [
            { label: 'Kaltmiete (Ø 25%)', value: kaltmiete, color: 'var(--text-dim)' },
            { label: 'MwSt (' + spendPct + '% Konsum)', value: vatFromNetto, color: 'var(--red3)' },
            { label: 'Energiesteuer (Kraftstoff)', value: energiesteuer, color: 'var(--red4)' },
            { label: 'Versicherungsteuer', value: versicherungsteuer, color: 'var(--red4)' },
            { label: 'Rundfunkbeitrag', value: rundfunk, color: 'var(--red4)' },
            { label: 'Kaffee-/Bier-/Sektsteuer', value: kaffeesteuer + bierSektsteuer, color: 'var(--red4)' },
            { label: 'Verbleibt bei dir', value: Math.max(1, verbleibt), color: 'var(--green)' },
          ];
          // Layout col3 aligned to "Du" node in col2
          const duNode = nodes2[nodes2.length - 1]; // last node = Du
          const nodes3 = layoutNodes(col3Items, duNode.y, duNode.height, 4);

          // Draw Sankey flow path
          const flowPath = (x0, y0, h0, x1, y1, h1) => {
            const midX = (x0 + x1) / 2;
            return `M${x0},${y0} C${midX},${y0} ${midX},${y1} ${x1},${y1} L${x1},${y1 + h1} C${midX},${y1 + h1} ${midX},${y0 + h0} ${x0},${y0 + h0} Z`;
          };

          // Build flows: col0 → col1
          const flows01 = [];
          let srcOffset0 = 0;
          nodes1.forEach(n1 => {
            const frac = n1.value / total;
            const srcH = frac * nodes0[0].height;
            flows01.push({
              path: flowPath(colX[0] + nodeW, nodes0[0].y + srcOffset0, srcH, colX[1], n1.y, n1.height),

          // Build flows: col1 → col2
          const flows12 = [];
          const col2Offsets = nodes2.map(() => 0);
          // Map: which col1 nodes flow to which col2 nodes
          const mapping12 = [
            // AG social → insurance
            { from: 0, to: 0, value: agKV }, // AG-KV → Krankenkassen
            { from: 1, to: 1, value: agRV }, // AG-RV → Rentenvers.
            { from: 2, to: 2, value: agPV }, // AG-PV → Pflegekassen
            { from: 3, to: 3, value: agAV }, // AG-AV → BA für Arbeit
            // AN social → insurance
            { from: 4, to: 0, value: anKV }, // AN-KV → Krankenkassen
            { from: 5, to: 1, value: anRV }, // AN-RV → Rentenvers.
            { from: 6, to: 2, value: anPV }, // AN-PV → Pflegekassen
            { from: 7, to: 3, value: anAV }, // AN-AV → BA für Arbeit
            // ESt → Bund/Länder/Gemeinden
            { from: 8, to: 4, value: bundESt }, // ESt → Bund
            { from: 8, to: 5, value: laenderESt }, // ESt → Länder
            { from: 8, to: 6, value: gemeindenESt }, // ESt → Gemeinden
          ];
          // Soli → Bund
          if (soli > 0) {
            mapping12.push({ from: nodes1.length - 2, to: 4, value: soli }); // Soli node → Bund
          }
          // Netto → Du
          mapping12.push({ from: nodes1.length - 1, to: 7, value: netto });

          const col1Offsets = nodes1.map(() => 0);
          mapping12.forEach(m => {
            const n1 = nodes1[m.from];
            const n2 = nodes2[m.to];
            const srcFrac = m.value / n1.value;
            const dstFrac = m.value / n2.value;
            const srcH = srcFrac * n1.height;
            const dstH = dstFrac * n2.height;
            flows12.push({
              path: flowPath(colX[1] + nodeW, n1.y + col1Offsets[m.from], srcH, colX[2], n2.y + col2Offsets[m.to], dstH),
              color: n2.color, opacity: 0.3,
            });
            col1Offsets[m.from] += srcH;
            col2Offsets[m.to] += dstH;
          });

          // Build flows: col2 (Du) → col3
          const flows23 = [];
          let duOffset = 0;
          nodes3.forEach(n3 => {
            const frac = n3.value / duNode.value;
            const srcH = frac * duNode.height;
            flows23.push({
              path: flowPath(colX[2] + nodeW, duNode.y + duOffset, srcH, colX[3], n3.y, n3.height),
              color: n3.color, opacity: 0.3,
            });
            duOffset += srcH;
          });

                {/* Flows */}
                {[...flows01, ...flows12, ...flows23].map((f, i) => (
                  <path key={i} d={f.path} fill={f.color} opacity={f.opacity} />
                ))}

                {/* Nodes col0 */}
                {nodes0.map((n, i) => (

                    <rect x={colX[0]} y={n.y} width={nodeW} height={n.height} fill="var(--text-dim)" rx="2" />

                  </g>

                {/* Nodes col1 */}

                    {n.height > 10 && (

                    )}
                  </g>
                ))}

                {/* Nodes col2 */}
                {nodes2.map((n, i) => (

                    <rect x={colX[2]} y={n.y} width={nodeW} height={n.height} fill={n.color} rx="2" />

                    )}
                  </g>
                ))}

              </svg>
            </div>
          );
        })()}

          const monthlyTax = inclSocial
            ? taxes.incomeTax + taxes.soli + taxes.social + taxes.employerSocial
            : taxes.incomeTax + taxes.soli;
          const rate = oppInterest / 100 / 12;
          const inflRate = oppInflation / 100;
          const monthlyInflRate = Math.pow(1 + inflRate, 1/12) - 1;
          const months = oppYears * 12;
          // Future value: step through monthly, with optional dynamic contributions
          let fv = 0;
          let totalPaid = 0;
          for (let m = 0; m < months; m++) {
            const contribution = oppDynamic ? monthlyTax * Math.pow(1 + monthlyInflRate, m) : monthlyTax;
            totalPaid += contribution;
            fv = (fv + contribution) * (1 + rate);
          }
          const gains = fv - totalPaid;
          // Real purchasing power after inflation
          const realFv = fv / Math.pow(1 + inflRate, oppYears);
          const inflationLoss = fv - realFv;

          // Breakdown by type
          const items = [
            ...(inclSocial ? [{ label: 'AG-Sozialabgaben', amount: taxes.employerSocial, color: 'var(--red4)' }] : []),
            { label: 'Einkommensteuer', amount: taxes.incomeTax, color: 'var(--red)' },
            ...(taxes.soli > 0 ? [{ label: 'Soli', amount: taxes.soli, color: 'var(--red3)' }] : []),
            ...(inclSocial ? [{ label: 'Sozialabgaben (AN)', amount: taxes.social, color: 'var(--red2)' }] : []),
          ];

          // Withdrawal simulation
          const annualNet = taxes.net * 12;
          const nominalRate = oppInterest / 100;
          let wdCapital = fv;
          let withdrawYears = 0;
          const maxSim = 200;
          const withdrawPoints = [{ yr: oppYears, value: fv, real: realFv }];
          while (wdCapital > 0 && withdrawYears < maxSim) {
            const yearsSinceStart = oppYears + withdrawYears;
            const withdrawal = annualNet * Math.pow(1 + inflRate, yearsSinceStart);
            wdCapital = wdCapital * (1 + nominalRate) - withdrawal;
            withdrawYears++;
            if (wdCapital < 0) wdCapital = 0;
            withdrawPoints.push({ yr: oppYears + withdrawYears, value: wdCapital, real: wdCapital / Math.pow(1 + inflRate, oppYears + withdrawYears) });
          }
          const infiniteWithdraw = withdrawYears >= maxSim;
          const totalYears = oppYears + (infiniteWithdraw ? Math.min(withdrawYears, oppYears) : withdrawYears);
          // Cap withdrawal display to reasonable length
          const wdDisplayYears = infiniteWithdraw ? oppYears : withdrawYears;
          const wdDisplayPoints = infiniteWithdraw ? withdrawPoints.slice(0, oppYears + 1) : withdrawPoints;

          // Year-by-year for chart (saving phase)
          const yearPoints = Array.from({ length: oppYears + 1 }, (_, yr) => {
            const m = yr * 12;
            let value = 0, paid = 0;
            for (let i = 0; i < m; i++) {
              const c = oppDynamic ? monthlyTax * Math.pow(1 + monthlyInflRate, i) : monthlyTax;
              paid += c;
              value = (value + c) * (1 + rate);
            }
            const real = value / Math.pow(1 + inflRate, yr);
            return { yr, value, paid, real };
          });
          const lastPt = yearPoints[oppYears];

          // Combined chart range
          const chartTotalYears = oppYears + wdDisplayYears;
          const allValues = [...yearPoints.map(p => p.value), ...wdDisplayPoints.map(p => p.value)];
          const maxVal = Math.max(...allValues) || 1;
          const w = 520, h = 240, pad = { top: 16, right: 20, bottom: 36, left: 56 };
          const xS = yr => pad.left + (yr / chartTotalYears) * (w - pad.left - pad.right);
          const yS = v => pad.top + (1 - v / maxVal) * (h - pad.top - pad.bottom);
          const linePath = (key) => yearPoints.map((p, i) => `${i === 0 ? 'M' : 'L'}${xS(p.yr)},${yS(p[key])}`).join(' ');
          const wdLinePath = (key) => wdDisplayPoints.map((p, i) => `${i === 0 ? 'M' : 'L'}${xS(p.yr)},${yS(p[key])}`).join(' ');

          return (
            <div className="resp-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 60 }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div className="ctrl-row">
                    <div className="ctrl-label">
                      <span className="ctrl-name">Zeitraum</span>
                      <span className="ctrl-value mono">{oppYears} Jahre</span>
                    </div>
                    <input type="range" min="1" max="40" value={oppYears} onChange={e => setOppYears(+e.target.value)} />
                  </div>
                  <div className="ctrl-row">
                    <div className="ctrl-label">
                      <span className="ctrl-name">Rendite (nominal)</span>
                      <span className="ctrl-value mono">{oppInterest}% / Jahr</span>
                    </div>
                    <input type="range" min="0" max="12" step="0.5" value={oppInterest} onChange={e => setOppInterest(+e.target.value)} />
                  </div>
                  <div className="ctrl-row">
                    <div className="ctrl-label">
                      <span className="ctrl-name">Inflation</span>
                      <span className="ctrl-value mono">{oppInflation}% / Jahr</span>
                    </div>
                    <input type="range" min="0" max="8" step="0.5" value={oppInflation} onChange={e => setOppInflation(+e.target.value)} />
                  </div>
                </div>
                <div style={{ background: 'var(--bg2)', borderRadius: 14, padding: '28px', border: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 16 }}>
                    {inclSocial ? 'Monatlich an den Staat (inkl. AG-Anteil)' : 'Monatlich Einkommensteuer + Soli'}
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 20 }}>
                    {items.map((item, i) => (
                      <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <div style={{ width: 8, height: 8, borderRadius: 2, background: item.color, flexShrink: 0 }} />
                          <span style={{ fontSize: 13, color: 'var(--text-dim)' }}>{item.label}</span>
                        </div>
                        <span style={{ fontFamily: 'var(--mono)', fontSize: 13 }}>{fmt(item.amount)} €</span>
                      </div>
                    ))}
                    <div style={{ borderTop: '1px solid var(--border)', paddingTop: 10, display: 'flex', justifyContent: 'space-between', fontWeight: 600 }}>
                      <span>Gesamt</span>
                      <span className="mono red">{fmt(monthlyTax)} €/Mo.</span>
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--text-dim)', lineHeight: 1.6 }}>
                    Das sind <strong style={{ color: 'var(--text)' }}>{fmt(monthlyTax * 12)} €</strong> pro Jahr, bei denen nicht du entscheidest, wie sie verwendet werden, sondern der Staat.
                  </div>
                </div>

                <div style={{ background: 'rgba(74,190,100,0.06)', borderRadius: 14, padding: '28px', border: '1px solid rgba(74,190,100,0.25)' }}>
                  <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--green)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 12 }}>
                    Nach {oppYears} Jahren bei {oppInterest}% Rendite
                  </div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 48, fontWeight: 500, color: 'var(--green)', lineHeight: 1, letterSpacing: '-0.02em' }}>
                    {fv >= 1_000_000 ? `${(fv / 1_000_000).toFixed(2)} Mio.` : `${fmt(fv)}`} €
                  </div>
                  <div style={{ marginTop: 16, display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {oppDynamic && (
                      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: 'var(--text-dim)' }}>
                        <span>Eingezahlt (heutige Kaufkraft)</span>
                        <span className="mono">{fmt(monthlyTax * 12 * oppYears)} €</span>
                      </div>
                    )}
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: oppDynamic ? 12 : 13, color: 'var(--text-dim)' }}>
                      <span>Eingezahlt{oppDynamic ? ' (nominal)' : ` (${months} Monate)`}</span>
                      <span className="mono">{fmt(totalPaid)} €</span>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
                      <span style={{ color: 'var(--green)' }}>Rendite (Zinseszins)</span>
                      <span className="mono green">+ {fmt(gains)} €</span>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, borderTop: '1px solid rgba(74,190,100,0.2)', paddingTop: 8 }}>
                      <span style={{ color: 'var(--red)' }}>− Inflation ({oppInflation}%/J.)</span>
                      <span className="mono red">− {fmt(inflationLoss)} €</span>
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 14, borderTop: '1px solid rgba(74,190,100,0.2)', paddingTop: 8, fontWeight: 600 }}>
                      <span style={{ color: 'var(--gold)' }}>Reale Kaufkraft</span>
                      <span className="mono" style={{ color: 'var(--gold)' }}>{realFv >= 1_000_000 ? `${(realFv / 1_000_000).toFixed(2)} Mio.` : `${fmt(realFv)}`} €</span>
                    </div>
                    {oppDynamic && (() => {
                      const realGain = realFv - monthlyTax * 12 * oppYears;
                      const isPos = realGain >= 0;
                      return (
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: isPos ? 'var(--gold)' : 'var(--red)', marginTop: -2 }}>
                          <span>{isPos ? 'Realer Gewinn' : 'Realer Verlust'}</span>
                          <span className="mono">{isPos ? '+' : '−'} {fmt(Math.abs(realGain))} €</span>
                        </div>
                      );
                    })()}
                  </div>
                </div>

                {/* Entnahmeplan */}
                <div style={{ background: 'rgba(241,196,15,0.06)', borderRadius: 14, padding: '28px', border: '1px solid rgba(241,196,15,0.25)' }}>
                  <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--gold)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 12 }}>
                    Entnahmeplan · Wie lange reicht das Kapital?
                  </div>
                  <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6, marginBottom: 16 }}>
                    Wenn du ab Jahr {oppYears} jährlich dein heutiges Nettogehalt ({fmt(annualNet)} €/Jahr, inflationsbereinigt) entnimmst und der Rest weiter {oppInterest}% Rendite erwirtschaftet:
                  </div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 42, fontWeight: 500, color: 'var(--gold)', lineHeight: 1 }}>
                    {infiniteWithdraw ? '∞' : withdrawYears} {infiniteWithdraw ? '' : 'Jahre'}
                  </div>
                  <div style={{ fontSize: 13, color: 'var(--text-dim)', marginTop: 8, lineHeight: 1.6 }}>
                    {infiniteWithdraw
                      ? 'Das Kapital reicht unbegrenzt — die Rendite übersteigt die inflationsbereinigte Entnahme.'
                      : `Nach ${withdrawYears} Jahren Entnahme wäre das Kapital aufgebraucht. Das entspricht einem Gesamtzeitraum von ${oppYears + withdrawYears} Jahren (${oppYears}J Ansparphase + ${withdrawYears}J Entnahme).`
                    }
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 12, padding: '10px 14px', background: 'rgba(241,196,15,0.08)', borderRadius: 8, lineHeight: 1.6 }}>
                    <strong style={{ color: 'var(--gold)' }}>Hinweis:</strong> Die Entnahme wird jährlich um {oppInflation}% erhöht, um die Inflation auszugleichen. Im ersten Entnahmejahr entnimmst du {fmt(Math.round(annualNet * Math.pow(1 + inflRate, oppYears)))} €, im letzten {!infiniteWithdraw && withdrawYears > 0 ? `${fmt(Math.round(annualNet * Math.pow(1 + inflRate, oppYears + withdrawYears - 1)))} €` : '—'} — damit bleibt die Kaufkraft immer auf dem Niveau deines heutigen Nettogehalts.
                  </div>
                </div>

                <div style={{ padding: '18px 22px', background: 'var(--bg2)', borderRadius: 10, border: '1px solid var(--border)', fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.7 }}>
                  <strong style={{ color: 'var(--text)' }}>Zum Vergleich:</strong>{' '}
                  Stattdessen zahlst du in {oppYears} Jahren <strong style={{ color: 'var(--red)' }}>{fmt(totalPaid)} €</strong> an den Staat — und finanzierst damit ein Rentenversprechen (ob es in {oppYears} Jahren noch eingelöst wird, weiß niemand), Grundsicherung, Infrastruktur (Straßen, Schiene, Digital), Forschung, Energiewende — aber auch Militär, Schuldzinsen und EU-Transfers.
                  Es geht nicht um die Abschaffung von Steuern, sondern darum, die <strong style={{ color: 'var(--text)' }}>Opportunitätskosten</strong> zu verdeutlichen. Ob das ein gutes Geschäft ist, entscheidest du.
                </div>
              </div>

              <div>
                <div style={{ fontSize: 12, fontFamily: 'var(--mono)', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 12 }}>
                  Ansparphase ({oppYears}J) + Entnahme ({infiniteWithdraw ? '∞' : `${wdDisplayYears}J`})
                </div>
                <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ overflow: 'visible' }}>
                  <defs>
                    <linearGradient id="oppGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="var(--green)" stopOpacity="0.2" />
                      <stop offset="100%" stopColor="var(--green)" stopOpacity="0" />
                    </linearGradient>
                    <linearGradient id="wdGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="var(--gold)" stopOpacity="0.15" />
                      <stop offset="100%" stopColor="var(--gold)" stopOpacity="0" />
                    </linearGradient>
                  </defs>
                  {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
                    const v = Math.round(maxVal * f / 10000) * 10000;
                    return (
                      <g key={i}>
                        <line x1={pad.left} x2={w - pad.right} y1={yS(v)} y2={yS(v)} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />
                        <text x={pad.left - 6} y={yS(v) + 4} fill="#555" fontSize="10" textAnchor="end">
                          {v >= 1000000 ? `${(v / 1000000).toFixed(1)}M` : `${(v / 1000).toFixed(0)}k`}
                        </text>
                      </g>
                    );
                  })}
                  {/* X-axis ticks for full range */}
                  {Array.from({ length: chartTotalYears + 1 }, (_, i) => {
                    const step = chartTotalYears <= 10 ? 1 : chartTotalYears <= 20 ? 2 : chartTotalYears <= 40 ? 5 : 10;
                    return (i % step === 0 || i === chartTotalYears) && <text key={i} x={xS(i)} y={h - 4} fill="#555" fontSize="10" textAnchor="middle">{i}J</text>;
                  })}
                  {/* Saving phase fill */}
                  <path d={`${linePath('value')} L${xS(oppYears)},${yS(0)} L${xS(0)},${yS(0)} Z`} fill="url(#oppGrad)" />
                  {/* Withdrawal phase fill */}
                  <path d={`${wdLinePath('value')} L${xS(wdDisplayPoints[wdDisplayPoints.length-1].yr)},${yS(0)} L${xS(oppYears)},${yS(0)} Z`} fill="url(#wdGrad)" />
                  {/* Phase separator */}
                  <line x1={xS(oppYears)} y1={pad.top} x2={xS(oppYears)} y2={h - pad.bottom} stroke="var(--text-dim)" strokeWidth="1" strokeDasharray="4,3" opacity="0.4" />
                  <text x={xS(oppYears)} y={pad.top - 4} fill="var(--text-dim)" fontSize="9" textAnchor="middle" fontFamily="var(--mono)">Entnahme →</text>
                  {/* Saving phase lines */}
                  <path d={linePath('paid')} fill="none" stroke="var(--text)" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.4" />
                  <path d={linePath('value')} fill="none" stroke="var(--green)" strokeWidth="2.5" />
                  {/* Real purchasing power lines (optional) */}
                  {oppShowReal && <path d={linePath('real')} fill="none" stroke="var(--blue)" strokeWidth="2" strokeDasharray="6,3" />}
                  {/* Withdrawal phase line */}
                  <path d={wdLinePath('value')} fill="none" stroke="var(--gold)" strokeWidth="2.5" />
                  {oppShowReal && <path d={wdLinePath('real')} fill="none" stroke="var(--blue)" strokeWidth="2" strokeDasharray="6,3" />}
                  {/* End markers - saving phase peak */}
                  <circle cx={xS(oppYears)} cy={yS(lastPt.value)} r="4" fill="var(--green)" />
                  {oppShowReal && <circle cx={xS(oppYears)} cy={yS(lastPt.real)} r="3" fill="var(--blue)" />}
                  {/* End marker - withdrawal end */}
                  {wdDisplayPoints.length > 1 && (
                    <circle cx={xS(wdDisplayPoints[wdDisplayPoints.length-1].yr)} cy={yS(wdDisplayPoints[wdDisplayPoints.length-1].value)} r="3" fill="var(--gold)" />
                  )}
                  {oppShowReal && wdDisplayPoints.length > 1 && (
                    <circle cx={xS(wdDisplayPoints[wdDisplayPoints.length-1].yr)} cy={yS(wdDisplayPoints[wdDisplayPoints.length-1].real)} r="3" fill="var(--blue)" />
                  )}
                  {/* Label at peak */}
                  <text x={xS(oppYears) - 4} y={yS(lastPt.value) - 8} fill="var(--green)" fontSize="10" textAnchor="end" fontFamily="var(--mono)">
                    {fv >= 1_000_000 ? `${(fv / 1_000_000).toFixed(1)}M` : `${(fv / 1000).toFixed(0)}k`}
                  </text>
                  {oppShowReal && (
                    <text x={xS(oppYears) - 4} y={yS(lastPt.real) - 8} fill="var(--blue)" fontSize="10" textAnchor="end" fontFamily="var(--mono)">
                      {realFv >= 1_000_000 ? `${(realFv / 1_000_000).toFixed(1)}M` : `${(realFv / 1000).toFixed(0)}k`} real
                    </text>
                  )}
                </svg>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginTop: 14, fontSize: 12, color: 'var(--text-dim)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div style={{ width: 20, height: 3, background: 'var(--green)', borderRadius: 1, flexShrink: 0 }} />
                    <span><strong style={{ color: 'var(--green)' }}>Vermögen (Ansparphase)</strong> — monatliche Einzahlung + {oppInterest}% Rendite</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div style={{ width: 20, height: 3, background: 'var(--gold)', borderRadius: 1, flexShrink: 0 }} />
                    <span><strong style={{ color: 'var(--gold)' }}>Restkapital (Entnahme)</strong> — jährlich {fmt(annualNet)} € entnommen (inflationsbereinigt)</span>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div style={{ width: 20, height: 0, borderTop: '2px dashed var(--text)', opacity: 0.4, flexShrink: 0 }} />
                    <span>Summe der Einzahlungen (ohne Rendite)</span>
                  </div>
                  {oppShowReal && (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div style={{ width: 20, height: 0, borderTop: '2px dashed var(--blue)', flexShrink: 0 }} />
                      <span><strong style={{ color: 'var(--blue)' }}>Reale Kaufkraft</strong> — was das Geld nach {oppInflation}% Inflation/Jahr tatsächlich wert ist</span>
                    </div>
                  )}
                </div>
                <button
                  onClick={() => setOppShowReal(!oppShowReal)}
                  style={{
                    marginTop: 12, padding: '6px 14px', borderRadius: 6, cursor: 'pointer',
                    fontFamily: 'var(--mono)', fontSize: 11, transition: 'all 0.2s',
                    background: oppShowReal ? 'var(--blue)' : 'var(--bg3)',
                    color: oppShowReal ? '#fff' : 'var(--text-dim)',
                    border: oppShowReal ? '1px solid var(--blue)' : '1px solid var(--border)',
                  }}
                >
                  {oppShowReal ? '✓ Reale Kaufkraft angezeigt' : 'Reale Kaufkraft einblenden'}
                </button>

                <div className="resp-grid-2col" style={{ marginTop: 32, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  {[
                    { label: `Nach ${Math.floor(oppYears / 2)} Jahren`, value: yearPoints[Math.floor(oppYears / 2)].value, paid: yearPoints[Math.floor(oppYears / 2)].paid, real: yearPoints[Math.floor(oppYears / 2)].real },
                    { label: `Nach ${oppYears} Jahren`, value: lastPt.value, paid: lastPt.paid, real: lastPt.real },
                  ].map((item, i) => (
                    <div key={i} style={{ background: 'var(--bg2)', borderRadius: 10, padding: '16px 18px', border: '1px solid var(--border)' }}>
                      <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>{item.label}</div>
                      <div style={{ fontFamily: 'var(--mono)', fontSize: 22, color: 'var(--green)', marginBottom: 4 }}>
                        {item.value >= 1_000_000 ? `${(item.value / 1_000_000).toFixed(2)} Mio.` : `${fmt(item.value)}`} €
                      </div>
                      <div style={{ fontSize: 11, color: 'var(--gold)', fontFamily: 'var(--mono)', marginBottom: 2 }}>
                        real: {item.real >= 1_000_000 ? `${(item.real / 1_000_000).toFixed(2)} Mio.` : `${fmt(item.real)}`} €
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        })()}
      </section>

      {/* SECTION: INFLATION */}
      <section id="inflation">
        <div className="section-label">Die unsichtbare Steuer</div>
        <h2>Inflation — <span className="red">die Steuer, die niemand beschließt</span></h2>
        <div style={{ marginBottom: 40, fontSize: 16, color: 'var(--text-dim)', lineHeight: 1.7, maxWidth: 720 }}>
          Inflation entwertet dein Erspartes — still, stetig, ohne Steuerbescheid.
          <strong style={{ color: 'var(--text)' }}>100 €</strong> aus dem Jahr 1999 haben heute nur noch eine Kaufkraft von etwa <strong style={{ color: 'var(--red)' }}>63,60 €</strong>.
          Wer spart, verliert. Aber woher kommt Inflation eigentlich?
        </div>

        {/* M3 + Kaufkraft side by side */}
        <div className="resp-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32, marginBottom: 48 }}>
          {/* Geldmenge M3 Chart */}
          <div>
            <h3 style={{ fontSize: 18, marginBottom: 8 }}>Geldmenge im Euroraum (M3)</h3>
            <div style={{ fontSize: 13, color: 'var(--text-dim)', marginBottom: 20, lineHeight: 1.6 }}>
              M3 misst alles Geld im Umlauf — Bargeld, Girokonten, Spareinlagen.
              Je mehr Geld im System ist, desto weniger ist jeder einzelne Euro wert.
            </div>
            {(() => {
              const data = [
                { year: 1999, value: 4.7 },
                { year: 2004, value: 6.4 },
                { year: 2008, value: 9.4 },
                { year: 2012, value: 9.8 },
                { year: 2016, value: 11.3 },
                { year: 2020, value: 14.4 },
                { year: 2022, value: 16.1 },
                { year: 2024, value: 16.6 },
              ];
              const chartW = 480;
              const chartH = 180;
              const padL = 40;
              const padR = 16;
              const padT = 16;
              const padB = 28;
              const w = chartW - padL - padR;
              const h = chartH - padT - padB;
              const minVal = 0;
              const maxVal = 18;
              const points = data.map((d, i) => {
                const x = padL + (i / (data.length - 1)) * w;
                const y = padT + h - ((d.value - minVal) / (maxVal - minVal)) * h;
                return { x, y, year: d.year, val: d.value, pandemic: d.year >= 2020 };
              });
              const line = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
              const area = line + ` L${points[points.length-1].x},${padT + h} L${points[0].x},${padT + h} Z`;

              { label: 'Ukraine-Darlehen 90 Mrd. (Rat)', url: 'https://www.consilium.europa.eu/en/press/press-releases/2026/04/23/council-finalises-90-billion-support-loan-to-ukraine/' },
              { label: 'SAFE 150 Mrd. (EU-Vertretung DE)', url: 'https://germany.representation.ec.europa.eu/news/eu-mitgliedstaaten-billigen-150-milliarden-euro-fur-safe-verteidigungsdarlehenspaket-2025-05-27_de' },
              { label: 'NextGenerationEU (EU-Kommission)', url: 'https://commission.europa.eu/strategy-and-policy/recovery-plan-europe_en' },
              { label: 'ReArm Europe / Weißbuch (EU-Vertretung DE)', url: 'https://germany.representation.ec.europa.eu/news/zur-zukunft-der-europaischen-verteidigung-weissbuch-und-rearm-europe-2025-03-19_de' },
            ].map((s, i) => (
              <a key={i} href={s.url} target="_blank" rel="noopener noreferrer"
                style={{ color: 'var(--text-dim)', fontSize: 11, fontFamily: 'var(--mono)', textDecoration: 'none', borderBottom: '1px solid var(--border)', paddingBottom: 1, transition: 'color 0.15s' }}
                onMouseEnter={e => e.target.style.color = 'var(--text)'}
                onMouseLeave={e => e.target.style.color = 'var(--text-dim)'}
              >{s.label} ↗</a>
            ))}
          </div>
        </div>
        <div className="footer-year mono" style={{ fontSize: 11 }}>Stand: Bundeshaushalt Soll 2024 · Steuertarif 2024 (StFEG)</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
