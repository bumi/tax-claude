<script type="text/babel">
const { useState } = React;

function fmt(n, digits=0) {
  return new Intl.NumberFormat('de-DE', { minimumFractionDigits: digits, maximumFractionDigits: digits }).format(n);
}

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function generateCrashes(seed, maxYears) {
  const rng = mulberry32(seed);
  const crashes = [];
  for (let yr = 1; yr <= maxYears; yr++) {
    const roll = rng();
    if (roll < 0.12) {
      const magnitude = -(0.15 + rng() * 0.30); // -15% to -45%
      crashes.push({ yr, magnitude });
    } else {
      rng(); // consume second number to keep sequence aligned
    }
  }
  return crashes;
}

function App() {
  const [monthlySaving, setMonthlySaving] = useState(500);
  const [oppYears, setOppYears] = useState(20);
  const [oppInterest, setOppInterest] = useState(7.5);
  const [oppInflation, setOppInflation] = useState(2);
  const [oppShowReal, setOppShowReal] = useState(false);
  const [oppDynamic, setOppDynamic] = useState(false);
  const [withdrawalAmount, setWithdrawalAmount] = useState(2000);
  const [chaosEnabled, setChaosEnabled] = useState(false);
  const [chaosSeed, setChaosSeed] = useState(() => Math.floor(Math.random() * 2147483647));
  const [taxEnabled, setTaxEnabled] = useState(true);

  const monthlyTax = monthlySaving;
  const rate = oppInterest / 100 / 12;
  const inflRate = oppInflation / 100;
  const monthlyInflRate = Math.pow(1 + inflRate, 1/12) - 1;
  const months = oppYears * 12;

  // Generate crash events (up to 240 years: max 40 saving + max 200 withdrawal)
  const crashes = chaosEnabled ? generateCrashes(chaosSeed, 240) : [];
  const crashMap = {};
  crashes.forEach(c => { crashMap[c.yr] = c.magnitude; });

  // Future value
  let fv = 0;
  let totalPaid = 0;
  for (let m = 0; m < months; m++) {
    const contribution = oppDynamic ? monthlyTax * Math.pow(1 + monthlyInflRate, m) : monthlyTax;
    totalPaid += contribution;
    fv = (fv + contribution) * (1 + rate);
    // Apply crash at end of each year
    if (chaosEnabled && m % 12 === 11) {
      const yr = Math.floor(m / 12) + 1;
      if (crashMap[yr]) {
        fv = fv * (1 + crashMap[yr]);
      }
    }
  }
  const gains = fv - totalPaid;
  const realFv = fv / Math.pow(1 + inflRate, oppYears);
  const inflationLoss = fv - realFv;

  // Abgeltungssteuer: 25% + 5,5% Soli = 26,375% on gains portion
  // Sparerpauschbetrag: 1.000 € (Single) / 2.000 € (Verheiratet) tax-free gains per year
  const abgeltungRate = 0.26375;
  const freibetrag = 1000; // yearly tax-free allowance on capital gains

  // Withdrawal simulation with Abgeltungssteuer
  // Each withdrawal consists of principal + gains proportionally.
  // Only the gains portion (minus Freibetrag) is taxed.
  const annualWithdrawal = withdrawalAmount * 12;
  const nominalRate = oppInterest / 100;
  let wdCapital = fv;
  let wdCostBasis = totalPaid; // track remaining cost basis in the portfolio
  let withdrawYears = 0;
  let totalTaxPaid = 0;
  let firstYearTax = 0;
  const maxSim = 200;
  const withdrawPoints = [{ yr: oppYears, value: fv, real: realFv }];
  while (wdCapital > 0 && withdrawYears < maxSim) {
    const yearsSinceStart = oppYears + withdrawYears;
    const absYr = yearsSinceStart + 1; // the year we're simulating
    // Apply crash BEFORE growth and withdrawal
    if (chaosEnabled && crashMap[absYr]) {
      wdCapital = wdCapital * (1 + crashMap[absYr]);
      // Cost basis doesn't change — crash is an unrealized loss
    }
    // Desired net withdrawal (what the user wants to receive after tax)
    const desiredNet = annualWithdrawal * Math.pow(1 + inflRate, yearsSinceStart);
    // Gains ratio in portfolio
    const gainsRatio = wdCapital > 0 ? Math.max(0, 1 - wdCostBasis / wdCapital) : 0;
    let gross = desiredNet;
    let yearTax = 0;
    if (taxEnabled) {
      // To receive desiredNet after tax, we need to withdraw more (gross)
      // Tax = (grossWithdrawal * gainsRatio - freibetrag) * abgeltungRate (if positive)
      // desiredNet = grossWithdrawal - tax
      // Solve iteratively for simplicity:
      for (let iter = 0; iter < 10; iter++) {
        const taxableGains = Math.max(0, gross * gainsRatio - freibetrag);
        const tax = taxableGains * abgeltungRate;
        gross = desiredNet + tax;
      }
      const taxableGains = Math.max(0, gross * gainsRatio - freibetrag);
      yearTax = taxableGains * abgeltungRate;
    }
    totalTaxPaid += yearTax;
    if (withdrawYears === 0) firstYearTax = yearTax;
    // Reduce cost basis proportionally
    const costBasisReduction = gross * (1 - gainsRatio);
    wdCostBasis = Math.max(0, wdCostBasis - costBasisReduction);
    // Capital grows by return, then gross withdrawal is taken out
    wdCapital = wdCapital * (1 + nominalRate) - gross;
    withdrawYears++;
    if (wdCapital < 0) wdCapital = 0;
    withdrawPoints.push({ yr: oppYears + withdrawYears, value: wdCapital, real: wdCapital / Math.pow(1 + inflRate, oppYears + withdrawYears) });
  }
  const infiniteWithdraw = withdrawYears >= maxSim;
  const wdDisplayYears = infiniteWithdraw ? oppYears : withdrawYears;
  const wdDisplayPoints = infiniteWithdraw ? withdrawPoints.slice(0, oppYears + 1) : withdrawPoints;

  // Calculate initial monthly gross withdrawal for display
  const initGainsRatio = fv > 0 ? Math.max(0, 1 - totalPaid / fv) : 0;
  let initGrossAnnual = annualWithdrawal;
  if (taxEnabled) {
    for (let iter = 0; iter < 10; iter++) {
      const tg = Math.max(0, initGrossAnnual * initGainsRatio - freibetrag);
      initGrossAnnual = annualWithdrawal + tg * abgeltungRate;
    }
  }
  const initGrossMonthly = initGrossAnnual / 12;

  // Year-by-year for chart (saving phase)
  const yearPoints = Array.from({ length: oppYears + 1 }, (_, yr) => {
    const m = yr * 12;
    let value = 0, paid = 0;
    for (let i = 0; i < m; i++) {
      const c = oppDynamic ? monthlyTax * Math.pow(1 + monthlyInflRate, i) : monthlyTax;
      paid += c;
      value = (value + c) * (1 + rate);
      if (chaosEnabled && i % 12 === 11) {
        const crashYr = Math.floor(i / 12) + 1;
        if (crashMap[crashYr]) {
          value = value * (1 + crashMap[crashYr]);
        }
      }
    }
    const real = value / Math.pow(1 + inflRate, yr);
    return { yr, value, paid, real };
  });
  const lastPt = yearPoints[oppYears];

  // Combined chart range
  const chartTotalYears = oppYears + wdDisplayYears;
  const allValues = [...yearPoints.map(p => p.value), ...wdDisplayPoints.map(p => p.value)];
  const maxVal = Math.max(...allValues) || 1;
  const w = 520, h = 240, pad = { top: 16, right: 20, bottom: 36, left: 56 };
  const xS = yr => pad.left + (yr / chartTotalYears) * (w - pad.left - pad.right);
  const yS = v => pad.top + (1 - v / maxVal) * (h - pad.top - pad.bottom);
  const linePath = (key) => yearPoints.map((p, i) => `${i === 0 ? 'M' : 'L'}${xS(p.yr)},${yS(p[key])}`).join(' ');
  const wdLinePath = (key) => wdDisplayPoints.map((p, i) => `${i === 0 ? 'M' : 'L'}${xS(p.yr)},${yS(p[key])}`).join(' ');

  return (
    <>
      <div style={{
        fontSize: 13, color: 'var(--text-dim)', textAlign: 'center',
        padding: '8px 24px', background: 'var(--bg2)', borderBottom: '1px solid var(--border)',
        fontFamily: 'var(--mono)', letterSpacing: '0.02em', lineHeight: 1.5,
        animation: 'disclaimerGlow 1.5s ease-out forwards',
      }}>
        Diese Seite wurde mit KI (<a href="https://claude.ai" target="_blank" rel="noopener noreferrer" style={{ color: '#d97746', textDecoration: 'none' }}>Claude</a>) recherchiert &amp; erstellt — als Inspiration, nicht als Anlageberatung. Do your own research.
      </div>
      <section>
        <div className="section-label">Vermögensrechner</div>
        <h2>Wie wächst dein Geld<br />bei <span className="green">{fmt(monthlySaving)} € monatlich</span>?</h2>
        <div style={{ marginBottom: 36, fontSize: 16, color: 'var(--text-dim)', lineHeight: 1.7, maxWidth: 720 }}>
          Berechne, wie viel Vermögen sich aufbaut, wenn du regelmäßig einen festen Betrag investierst — und wie lange es im Ruhestand reicht. Ziel ist es, ein Gefühl für die Wertentwicklung bei verschiedenen Konfigurationen zu bekommen und <strong style={{ color: 'var(--text)' }}>zur eigenen Finanzplanung zu inspirieren.</strong>
        </div>

        <div className="resp-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 60 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

            {/* Monthly savings input */}
            <div style={{ background: 'var(--bg2)', borderRadius: 14, padding: '28px', border: '1px solid var(--border)' }}>
              <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 16 }}>
                Monatlicher Sparbetrag
              </div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 16 }}>
                <input
                  type="number"
                  min="0"
                  step="50"
                  value={monthlySaving}
                  onChange={e => setMonthlySaving(Math.max(0, +e.target.value))}
                />
                <span style={{ fontFamily: 'var(--mono)', fontSize: 24, color: 'var(--text-dim)' }}>€ / Monat</span>
              </div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {[100, 250, 500, 1000, 2000].map(v => (
                  <button
                    key={v}
                    onClick={() => setMonthlySaving(v)}
                    style={{
                      padding: '6px 14px', borderRadius: 100, cursor: 'pointer',
                      fontFamily: 'var(--sans)', fontSize: 13, transition: 'all 0.2s',
                      border: monthlySaving === v ? '1px solid var(--text)' : '1px solid var(--border)',
                      background: 'transparent',
                      color: monthlySaving === v ? 'var(--text)' : 'var(--text-dim)',
                    }}
                  >
                    {fmt(v)} €
                  </button>
                ))}
              </div>
              <div style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 12, lineHeight: 1.6 }}>
                Das sind <strong style={{ color: 'var(--text)' }}>{fmt(monthlySaving * 12)} €</strong> pro Jahr.
              </div>
            </div>

            {/* Controls */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div className="ctrl-row">
                <div className="ctrl-label">
                  <span className="ctrl-name">Zeitraum</span>
                  <span className="ctrl-value mono">{oppYears} Jahre</span>
                </div>
                <input type="range" min="1" max="40" value={oppYears} onChange={e => setOppYears(+e.target.value)} />
              </div>
              <div className="ctrl-row">
                <div className="ctrl-label">
                  <span className="ctrl-name">Rendite (nominal)</span>
                  <span className="ctrl-value mono">{oppInterest}% / Jahr</span>
                </div>
                <input type="range" min="0" max="12" step="0.5" value={oppInterest} onChange={e => setOppInterest(+e.target.value)} />
              </div>
              <div className="ctrl-row">
                <div className="ctrl-label">
                  <span className="ctrl-name">Inflation</span>
                  <span className="ctrl-value mono">{oppInflation}% / Jahr</span>
                </div>
                <input type="range" min="0" max="8" step="0.5" value={oppInflation} onChange={e => setOppInflation(+e.target.value)} />
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 8 }}>
                <button onClick={() => setOppDynamic(!oppDynamic)} style={{
                  width: 44, height: 24, borderRadius: 12, border: 'none', cursor: 'pointer', position: 'relative',
                  background: oppDynamic ? 'var(--green)' : 'rgba(255,255,255,0.1)', transition: 'background 0.2s',
                }}>
                  <div style={{
                    width: 18, height: 18, borderRadius: '50%', background: 'var(--text)',
                    position: 'absolute', top: 3, left: oppDynamic ? 23 : 3, transition: 'left 0.2s',
                  }} />
                </button>
                <span style={{ fontSize: 13, color: oppDynamic ? 'var(--text)' : 'var(--text-dim)', transition: 'color 0.2s' }}>
                  Dynamik: Einzahlung steigt jährlich um Inflation
                </span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 4 }}>
                <button onClick={() => setChaosEnabled(!chaosEnabled)} style={{
                  width: 44, height: 24, borderRadius: 12, border: 'none', cursor: 'pointer', position: 'relative',
                  background: chaosEnabled ? 'var(--red)' : 'rgba(255,255,255,0.1)', transition: 'background 0.2s',
                }}>
                  <div style={{
                    width: 18, height: 18, borderRadius: '50%', background: 'var(--text)',
                    position: 'absolute', top: 3, left: chaosEnabled ? 23 : 3, transition: 'left 0.2s',
                  }} />
                </button>
                <span style={{ fontSize: 13, color: chaosEnabled ? 'var(--text)' : 'var(--text-dim)', transition: 'color 0.2s' }}>
                  Marktcrashs simulieren
                </span>
                {chaosEnabled && (
                  <button
                    onClick={() => setChaosSeed(Math.floor(Math.random() * 2147483647))}
                    title="Neu würfeln"
                    style={{
                      background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 6,
                      padding: '3px 8px', cursor: 'pointer', fontSize: 14, lineHeight: 1,
                      color: 'var(--text-dim)', transition: 'all 0.2s',
                    }}
                  >
                    🎲
                  </button>
                )}
              </div>
              {chaosEnabled && crashes.filter(c => c.yr <= oppYears + wdDisplayYears).length > 0 && (
                <div style={{
                  marginTop: 8, padding: '10px 14px', background: 'rgba(255,60,60,0.06)',
                  borderRadius: 8, border: '1px solid rgba(255,60,60,0.15)',
                }}>
                  <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--red)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>
                    Crash-Events
                  </div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {crashes.filter(c => c.yr <= oppYears + wdDisplayYears).map((c, i) => (
                      <span key={i} style={{
                        fontFamily: 'var(--mono)', fontSize: 11, padding: '2px 8px',
                        borderRadius: 4, background: 'rgba(255,60,60,0.1)', color: 'var(--red)',
                      }}>
                        J{c.yr}: {(c.magnitude * 100).toFixed(0)}%
                      </span>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Future Value Card */}
            <div style={{ background: 'rgba(74,190,100,0.06)', borderRadius: 14, padding: '28px', border: '1px solid rgba(74,190,100,0.25)' }}>
              <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--green)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 12 }}>
                Nach {oppYears} Jahren bei {oppInterest}% Rendite
              </div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 48, fontWeight: 500, color: 'var(--green)', lineHeight: 1, letterSpacing: '-0.02em' }}>
                {fv >= 1_000_000 ? `${(fv / 1_000_000).toFixed(2)} Mio.` : `${fmt(fv)}`} €
              </div>
              <div style={{ marginTop: 16, display: 'flex', flexDirection: 'column', gap: 8 }}>
                {oppDynamic && (
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: 'var(--text-dim)' }}>
                    <span>Eingezahlt (heutige Kaufkraft)</span>
                    <span className="mono">{fmt(monthlyTax * 12 * oppYears)} €</span>
                  </div>
                )}
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: oppDynamic ? 12 : 13, color: 'var(--text-dim)' }}>
                  <span>Eingezahlt{oppDynamic ? ' (nominal)' : ` (${months} Monate)`}</span>
                  <span className="mono">{fmt(totalPaid)} €</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13 }}>
                  <span style={{ color: gains >= 0 ? 'var(--green)' : 'var(--red)' }}>{gains >= 0 ? 'Rendite (Zinseszins)' : 'Verlust (nach Crashs)'}</span>
                  <span className="mono" style={{ color: gains >= 0 ? 'var(--green)' : 'var(--red)' }}>{gains >= 0 ? '+' : '−'} {fmt(Math.abs(gains))} €</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, borderTop: '1px solid rgba(74,190,100,0.2)', paddingTop: 8 }}>
                  <span style={{ color: 'var(--red)' }}>− Inflation ({oppInflation}%/J.)</span>
                  <span className="mono red">− {fmt(inflationLoss)} €</span>
                </div>

            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--red)', marginBottom: 8 }}>Bitcoin-Totalverlust</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              Regulierungsverbote, technische Schwachstellen oder ein besseres Protokoll könnten Bitcoin wertlos machen.
              <div style={{ marginTop: 8, color: 'var(--text)' }}>→ Bewusst auf 10% begrenzt. Ein Totalverlust kostet das Portfolio −10% — schmerzhaft, aber verkraftbar. Ein 10x macht +100%. Die Asymmetrie spricht für die Position, nicht dagegen.</div>
            </div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--red)', marginBottom: 8 }}>Systemischer Kollaps (Krieg, Pandemie, Finanzsystemversagen)</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              Weltkrieg, globale Pandemie schlimmer als COVID, Zusammenbruch des Bankensystems — Szenarien, in denen alles gleichzeitig fällt.
              <div style={{ marginTop: 8, color: 'var(--text)' }}>→ Kein Portfolio schützt vollständig vor dem Ende des Weltwirtschaftssystems. Aber: physisches Gold und Bitcoin (eigene Keys) existieren außerhalb des Bankensystems. In jeder bisherigen Krise der Menschheitsgeschichte haben sich Märkte erholt — wer durchhielt, wurde belohnt.</div>
            </div>
          </div>
        </div>

        <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
          <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
            <strong style={{ color: 'var(--text)' }}>Das größte Risiko von allen:</strong> Nicht investieren. Wer aus Angst vor Crashs, Inflation oder Unsicherheit sein Geld auf dem Girokonto lässt, verliert garantiert — leise, stetig, jedes Jahr. Die Inflation ist der einzige Gegner, der mit Sicherheit gewinnt, wenn man nichts tut.
          </div>
        </div>

      </section>

      <section style={{ minHeight: 'auto' }}>
        <div className="section-label">Asset-Klassen</div>
        <h2>Jenseits von<br/><span className="green">Aktien &amp; Anleihen</span></h2>

        <div className="resp-grid" style={{ gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 20 }}>
          {/* Welt-Aktien */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--green)' }}>Welt-Aktien</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 28, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 26, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Kern jedes Portfolios. Ein einziger Welt-ETF (z.B. auf den MSCI World oder FTSE All-World) streut über Tausende Unternehmen in dutzenden Ländern. Achte auf geringe Kosten (TER unter 0,3%) und ausreichendes Fondsvolumen. Thesaurierend ist steuerlich einfacher. <a href="https://rpc.cfainstitute.org/sites/default/files/-/media/documents/book/rf-publication/2021/sbbi-summary-edition-2021.pdf" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: Ibbotson SBBI Yearbook">↗</a></div>
          </div>
          {/* Anleihen */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--blue)' }}>Anleihen</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 12, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 8, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Stabilisator im Portfolio. Staatsanleihen-ETFs senken die Schwankungen, Unternehmensanleihen liefern mehr Rendite bei mehr Risiko. Kurzlaufende Anleihen sind weniger zinssensitiv — wichtig bei steigenden Zinsen. Alternativ: Tages-/Festgeld als risikoarmer Portfolioteil. <span style={{ fontSize: 13, opacity: 0.5 }} title="Quelle: Vanguard Research — Global Fixed Income">↗</span></div>
          </div>
          {/* REITs */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--blue)' }}>Immobilien / REITs</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 26, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 24, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Immobilien-Exposure ohne Direktkauf über REIT-ETFs. Regelmäßige Ausschüttungen und Inflationsschutz durch Mietanpassungen. Aber: stark zinsabhängig und oft schon im Welt-ETF enthalten — doppelte Gewichtung prüfen. Offene Immobilienfonds sind eine Alternative, aber weniger liquide. <a href="https://www.reit.com/data-research/reit-indexes/ftse-nareit-us-real-estate-index-historical-values-returns" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: NAREIT — FTSE Nareit All Equity REITs Index">↗</a></div>
          </div>
          {/* Gold & Rohstoffe */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--gold)' }}>Gold &amp; Rohstoffe</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 16, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 20, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Gold als Krisenversicherung, breite Rohstoffe als Inflationshedge. <strong style={{ color: 'var(--text)' }}>Physisches Gold</strong> (Münzen, Barren) ist nach 1 Jahr Haltedauer in DE steuerfrei und hat kein Emittentenrisiko — dafür Lagerkosten. ETCs (börsengehandelt, physisch besichert) sind bequemer, unterliegen aber der Abgeltungssteuer. Rohstoff-ETFs haben zusätzliche Rollkosten bei Futures. <a href="https://www.gold.org/goldhub/data/gold-prices" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: World Gold Council">↗</a></div>
          </div>
          {/* Krypto */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--gold)' }}>Kryptowährungen</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 40, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 40, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Höchste Rendite aller Asset-Klassen seit 2010 — aber Drawdowns bis −77%. <strong style={{ color: 'var(--text)' }}>Direktkauf bevorzugen:</strong> In DE nach 1 Jahr Haltedauer komplett steuerfrei (privates Veräußerungsgeschäft). ETPs sind zwar bequemer, aber Gewinne unterliegen der Abgeltungssteuer und du trägst Emittentenrisiko. Eigene Wallet = eigene Kontrolle, aber auch eigene Verantwortung für Sicherheit (Seed-Phrase!). <a href="https://coinmetrics.io/" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: CoinMetrics">↗</a></div>
          </div>
          {/* Infrastruktur */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--blue)' }}>Infrastruktur</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 24, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 18, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Mautstraßen, Stromnetze, Windparks, Flughäfen. Stabile, oft inflationsgebundene Cashflows. Über Infrastruktur-ETFs zugänglich, aber Achtung: viele enthalten vor allem Versorger und Industrieunternehmen — nicht „echte" Infrastruktur. Politisches Risiko beachten. <a href="https://www.spglobal.com/spdji/en/indices/equity/sp-global-infrastructure-index/" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: S&amp;P Global Infrastructure Index">↗</a></div>
          </div>
          {/* Private Equity */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--blue)' }}>Private Equity</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 34, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 32, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Nicht-börsennotierte Unternehmen. Yale allokiert ~40% in PE/VC. Für Privatanleger über „Listed Private Equity"-ETFs möglich, aber die bilden die tatsächliche PE-Rendite nur eingeschränkt ab. Direkt-Plattformen existieren (ab ~10k €), aber Kapital ist über Jahre gebunden und Managerauswahl entscheidet stark über Erfolg oder Misserfolg. <span style={{ fontSize: 13, opacity: 0.5 }} title="Quelle: David Swensen — Pioneering Portfolio Management">↗</span></div>
          </div>
          {/* Farmland / Wald */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--blue)' }}>Farmland &amp; Wald</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 22, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 12, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Niedrige Volatilität, kaum Korrelation zu Aktien. Wald profitiert zusätzlich von CO₂-Zertifikaten. Über Timber-/Forestry-ETFs oder Agrar-ETFs annäherbar, echtes Farmland ist für Privatanleger kaum direkt zugänglich. Eher eine Nische als Portfoliokern. <a href="https://ncreif.org/data/index-returns/" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: NCREIF Farmland Index">↗</a></div>
          </div>
          {/* Emerging Markets */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--green)' }}>Emerging Markets</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 26, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 30, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>China, Indien, Brasilien, Südkorea. Höheres Wachstum, aber auch politische und Währungsrisiken. Ein breiter EM-ETF reicht — wer China-Risiko begrenzen will, kann einen ex-China-Variante wählen. Ein FTSE All-World oder MSCI ACWI enthält bereits ~10–12% Schwellenländer. <a href="https://www.msci.com/indexes/index/891800" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: MSCI Emerging Markets Index">↗</a></div>
          </div>
          {/* Länder- & Regionenwetten */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--green)' }}>Länder- &amp; Regionenwetten</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 30, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 34, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Die Weltwirtschaft verschiebt sich. <strong style={{ color: 'var(--text)' }}>Indien</strong> wird voraussichtlich die drittgrößte Volkswirtschaft, <strong style={{ color: 'var(--text)' }}>Vietnam</strong> und <strong style={{ color: 'var(--text)' }}>Indonesien</strong> wachsen rasant, <strong style={{ color: 'var(--text)' }}>Afrika</strong> hat die jüngste Bevölkerung der Welt. Einzelne Länder-ETFs ermöglichen gezielte Wetten — aber Vorsicht: hohes Konzentrationsrisiko, Währungsschwankungen und politische Instabilität. Japan galt in den 1980ern als unaufhaltsam und brauchte 34 Jahre, um sein Allzeithoch wiederzusehen.</div>
          </div>
          {/* Small Caps */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--green)' }}>Small Caps</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 30, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 30, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Kleine Unternehmen lieferten historisch eine Prämie gegenüber Large Caps (der „Size-Faktor" nach Fama/French). Sie sind volatiler, weniger liquide und weniger analysiert — genau das schafft Chancen. Ein MSCI World enthält keine Small Caps; wer sie will, braucht einen separaten Small-Cap-ETF oder einen All-Cap-Index wie den MSCI ACWI IMI. <a href="https://rpc.cfainstitute.org/sites/default/files/-/media/documents/book/rf-publication/2021/sbbi-summary-edition-2021.pdf" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: Ibbotson SBBI Yearbook">↗</a></div>
          </div>
          {/* Dividendenaktien */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--green)' }}>Dividendenaktien</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 24, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 22, height: 3, borderRadius: 1.5, background: 'var(--red)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▼</span></div>
              </div>
            </div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Unternehmen mit stabilen, wachsenden Dividenden bieten einen psychologischen Vorteil: regelmäßige Ausschüttungen machen Kursrückgänge erträglicher. Aber Dividenden sind nicht „geschenktes Geld" — der Kurs fällt am Ex-Tag um die Ausschüttung. In DE steuerlich nachteilig gegenüber thesaurierenden Fonds, da jede Ausschüttung sofort besteuert wird.</div>
          </div>
          {/* Sammlerstücke */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '20px 24px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--text-dim)' }}>Sammlerstücke &amp; Luxusgüter</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}><div style={{ width: 18, height: 3, borderRadius: 1.5, background: 'var(--green)', opacity: 0.6 }}></div><span style={{ fontSize: 9, color: 'var(--text-dim)', fontFamily: 'var(--mono)' }}>▲</span></div>

            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Uhren, Kunst, Wein, Oldtimer, seltene Sneaker — manche Sammlerstücke haben über Jahrzehnte beeindruckende Wertsteigerungen erzielt. Aber: kein laufender Ertrag, hohe Transaktionskosten, Fälschungsrisiko, Lagerung/Versicherung nötig und Liquidität nur bei Nachfrage. Kein Portfoliobaustein im klassischen Sinn — eher Liebhaberei mit möglicher Rendite.</div>

            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Wer 50 Jahre durchgehalten hat, wurde trotz zahlreicher Krisen belohnt. <a href="https://rpc.cfainstitute.org/sites/default/files/-/media/documents/book/rf-publication/2021/sbbi-summary-edition-2021.pdf" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: Ibbotson SBBI Yearbook">↗</a></div>

            <div style={{ fontSize: 28, fontWeight: 600, color: 'var(--red)', marginBottom: 8 }}>Real negativ</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Das „verlorene Jahrzehnt" — Dotcom-Crash und Finanzkrise vernichteten ein Jahrzehnt Rendite. <a href="https://rpc.cfainstitute.org/sites/default/files/-/media/documents/book/rf-publication/2021/sbbi-summary-edition-2021.pdf" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: Ibbotson SBBI Yearbook">↗</a></div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--red)', marginBottom: 8 }}>1980–2000 · Gold</div>
            <div style={{ fontSize: 28, fontWeight: 600, color: 'var(--red)', marginBottom: 8 }}>Seitwärts/Verlust</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Nach dem Höchststand 1980 verlor Gold inflationsbereinigt über zwei Jahrzehnte an Wert. <a href="https://www.gold.org/goldhub/data/gold-prices" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: World Gold Council">↗</a></div>
          </div>

            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--green)', marginBottom: 8 }}>2000–2020 · Gold</div>

            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Vervielfachung — Gold wurde zur Top-Anlageklasse dieser zwei Jahrzehnte. <a href="https://www.gold.org/goldhub/data/gold-prices" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: World Gold Council">↗</a></div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>

            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Aktien und Anleihen fielen gleichzeitig — die Korrelation, auf die sich Jahrzehnte verlassen wurde, brach. <span style={{ fontSize: 13, opacity: 0.5 }} title="Quelle: Vanguard Research — Global Fixed Income">↗</span></div>

            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>Starke Outperformance gegenüber Industrieländern — der BRIC-Hype. <a href="https://www.msci.com/indexes/index/891800" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: MSCI Emerging Markets Index">↗</a></div>
          </div>

      <section style={{ minHeight: 'auto' }}>
        <div className="section-label">Strategien</div>
        <h2>Beide Seiten haben<br/><span className="red">gute Argumente</span></h2>
        <div className="resp-grid" style={{ gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 20 }}>
          {/* Aktiv vs. Passiv */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--gold)', marginBottom: 12 }}>Aktiv vs. Passiv</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              <div><strong style={{ color: 'var(--green)' }}>Für Passiv:</strong> Warren Buffett gewann 2007 eine Wette — ein S&amp;P 500 Indexfonds schlug fünf ausgewählte Hedge-Fonds über 10 Jahre deutlich.</div>
              <div><strong style={{ color: 'var(--red)' }}>Für Aktiv:</strong> Renaissance Technologies (Medallion Fund) erzielte ~66% p.a. über Jahrzehnte — aber diesen Zugang hat kein Privatanleger.</div>
              <div style={{ borderTop: '1px solid var(--border)', paddingTop: 12, color: 'var(--text)' }}>Fazit: Für die meisten Privatanleger spricht viel für passives Investieren. Doch „der Markt" funktioniert nur, weil aktive Teilnehmer Preise finden.</div>
            </div>
          </div>
          {/* Market Timing vs. Time in Market */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--gold)', marginBottom: 12 }}>Market Timing vs. Time in Market</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              <div><strong style={{ color: 'var(--green)' }}>Time in Market:</strong> Wer die 10 besten Börsentage in 20 Jahren verpasst, verliert ~50% der Gesamtrendite.</div>
              <div><strong style={{ color: 'var(--red)' }}>Market Timing:</strong> Wer die 10 schlechtesten Tage vermeidet, verdoppelt die Rendite fast. Die besten und schlechtesten Tage liegen oft nah beieinander.</div>
              <div style={{ borderTop: '1px solid var(--border)', paddingTop: 12, color: 'var(--text)' }}>Fazit: Beides ist in der Praxis kaum möglich — stetiges, regelmäßiges Investieren gewinnt. <a href="https://am.jpmorgan.com/us/en/asset-management/adv/insights/market-insights/guide-to-the-markets/" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: J.P. Morgan Guide to the Markets">↗</a></div>
            </div>
          </div>
          {/* Einzelaktien vs. Indexfonds */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--gold)', marginBottom: 12 }}>Einzelaktien vs. Indexfonds</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              <div>Nur ~4% aller Aktien erzeugen den gesamten Aktienmarktgewinn über dem Geldmarkt. Die restlichen 96% performen in Summe nicht besser als kurzfristige Staatsanleihen. <a href="https://papers.ssrn.com/sol3/papers.cfm?abstract_id=2900447" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: Bessembinder — Do Stocks Outperform Treasury Bills?">↗</a></div>
              <div style={{ borderTop: '1px solid var(--border)', paddingTop: 12, color: 'var(--text)' }}>Ein Indexfonds garantiert, diese entscheidenden 4% im Portfolio zu haben. Stockpicking riskiert, sie zu verpassen.</div>
            </div>
          </div>
          {/* Home Bias */}
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--gold)', marginBottom: 12 }}>Home Bias</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              <div>Deutsche Anleger übergewichten deutsche Aktien stark — obwohl der DAX nur ~2–3% der Welt-Marktkapitalisierung ausmacht.</div>
              <div style={{ borderTop: '1px solid var(--border)', paddingTop: 12, color: 'var(--text)' }}>Klumpenrisiko: Arbeitseinkommen, Immobilie und Aktienportfolio hängen dann alle vom selben Land ab. Ein breit gestreuter Welt-Index reduziert dieses Risiko.</div>
            </div>
          </div>
        </div>

      </section>

      <section style={{ minHeight: 'auto' }}>
        <div className="section-label">Bankberater</div>
        <h2>Was dein Bankberater<br/><span className="red">nicht sagt</span></h2>
        <div className="resp-grid" style={{ gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 20 }}>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--red)', marginBottom: 12 }}>Kosten fressen Rendite</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              1,5% TER (typischer aktiver Fonds) vs. 0,2% TER (ETF) klingt harmlos. Über 30 Jahre ergibt das aber ~30% weniger Endvermögen — ein Drittel deiner Rendite geht an den Fondsmanager. <a href="https://www.vanguardmexico.com/content/dam/intl/americas/documents/latam/en/2022/05/mx-sa-2217207-the-case-for-low-cost-index-fund-investing.pdf" target="_blank" rel="noopener" style={{ color: 'var(--text-dim)', fontSize: 14, textDecoration: 'none', opacity: 0.7 }} title="Quelle: Vanguard — The Case for Low-Cost Index Funds">↗</a>
            </div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--red)', marginBottom: 12 }}>Hauseigene Produkte</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              Bankberater verdienen an Ausgabeaufschlägen und Provisionen — nicht an deiner Rendite. Das ist ein struktureller Interessenkonflikt. Sie empfehlen bevorzugt Produkte, an denen die Bank verdient.
            </div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--red)', marginBottom: 12 }}>Survivorship Bias</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              Schlecht performende Fonds werden geschlossen oder mit besseren fusioniert. Die verbleibenden sehen dadurch künstlich besser aus. Die Statistik „80% unserer Fonds schlagen den Markt" verschweigt die bereits verschwundenen.
            </div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: 28 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--red)', marginBottom: 12 }}>Sparplan vs. Einmalanlage</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7 }}>
              Historisch ist die Einmalanlage in ~68% der Fälle besser als ein Sparplan. Der Grund: Märkte steigen langfristig, und Geld, das früher investiert ist, arbeitet länger. Aber der Sparplan senkt das Timing-Risiko und ist psychologisch leichter durchzuhalten. <span style={{ fontSize: 13, opacity: 0.5 }} title="Quelle: Vanguard — Dollar-cost averaging just means taking risk later, 2012">↗</span>
            </div>
          </div>
        </div>

      </section>

      <section style={{ minHeight: 'auto' }}>
        <div className="section-label">Investoren</div>
        <h2>Stimmen globaler<br/><span className="green">Investoren</span></h2>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 }}>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '16px 24px' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--gold)', marginBottom: 6 }}>Warren Buffett 🇺🇸</div>
            <div style={{ fontSize: 14, color: 'var(--text)', lineHeight: 1.6, marginBottom: 4, fontStyle: 'italic' }}>Sei ängstlich, wenn andere gierig sind, und gierig, wenn andere ängstlich sind.</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6 }}>Kauft antizyklisch und hält Jahrzehnte. Berkshire Hathaway ist fast ausschließlich in US-Aktien investiert — Apple allein macht ~50% des Aktienportfolios aus. Hält konstant ~25% in Cash und kurzlaufenden US-Staatsanleihen (~300 Mrd. $). Seine Anweisung an den Nachlassverwalter: 90% in einen S&amp;P 500 Indexfonds, 10% in Staatsanleihen.</div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '16px 24px' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--gold)', marginBottom: 6 }}>Charlie Munger 🇺🇸</div>
            <div style={{ fontSize: 14, color: 'var(--text)', lineHeight: 1.6, marginBottom: 4, fontStyle: 'italic' }}>Das große Geld liegt nicht im Kaufen oder Verkaufen, sondern im Warten.</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6 }}>Plädierte für konzentrierte Portfolios mit wenigen, extrem gut verstandenen Positionen — das Gegenteil von breiter Diversifikation. Sein persönliches Portfolio bestand zeitweise aus nur 3–4 Aktien. War früh in BYD (chinesischer Autobauer) investiert — eine seltene Nicht-US-Wette, die sich vervielfachte.</div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '16px 24px' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--gold)', marginBottom: 6 }}>Ray Dalio 🇺🇸</div>
            <div style={{ fontSize: 14, color: 'var(--text)', lineHeight: 1.6, marginBottom: 4, fontStyle: 'italic' }}>Diversifiziere gut und du kannst die Rendite ohne das Risiko haben.</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6 }}>Sein „All Weather Portfolio" verteilt Risiko über Aktien (~30%), langfristige Anleihen (~40%), mittelfristige Anleihen (~15%), Gold (~7,5%) und Rohstoffe (~7,5%). Bridgewater investiert global — USA, Europa, Asien. Dalio ist zunehmend bullish auf China und hält Gold als Absicherung gegen Schuldenzyklen und Währungsabwertung.</div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '16px 24px' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--gold)', marginBottom: 6 }}>Li Ka-shing 🇭🇰</div>
            <div style={{ fontSize: 14, color: 'var(--text)', lineHeight: 1.6, marginBottom: 4, fontStyle: 'italic' }}>Bevor du investierst, investiere in dich selbst.</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6 }}>Hongkongs reichster Investor. Diversifiziert über Kontinente und Branchen: Immobilien (Asien), Häfen (weltweit, ~30% des globalen Containerverkehrs), Telekommunikation (Europa, Kanada, Australien), Energie (Kanada). Verkaufte ab 2013 massiv China-Immobilien und investierte in Europa — eine Regionenwette, die kontrovers war, aber aufging.</div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '16px 24px' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--gold)', marginBottom: 6 }}>Rakesh Jhunjhunwala 🇮🇳</div>
            <div style={{ fontSize: 14, color: 'var(--text)', lineHeight: 1.6, marginBottom: 4, fontStyle: 'italic' }}>Wette auf Indien.</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6 }}>„Indiens Warren Buffett" investierte fast ausschließlich in indische Aktien — Titan Company (Schmuck/Uhren), Tata Motors, Lupin (Pharma), CRISIL (Ratings). 100% Länderwette auf Indien, 100% Aktien, kein nennenswerter Anteil in Anleihen oder internationalen Assets. Gründete kurz vor seinem Tod die Airline Akasa Air. Ein Survivorship-Bias-Beispiel: Tausende indische Stockpicker scheiterten, er wurde Milliardär.</div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '16px 24px' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--gold)', marginBottom: 6 }}>Nassef Sawiris 🇪🇬</div>
            <div style={{ fontSize: 14, color: 'var(--text)', lineHeight: 1.6, marginBottom: 4, fontStyle: 'italic' }}>Kaufe, was du verstehst, in Regionen, die andere meiden.</div>
            <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6 }}>Ägyptens reichster Investor. Kernvermögen in OCI (Baustoffe/Düngemittel, global aktiv — Niederlande, USA, Ägypten, Algerien). Dazu Beteiligungen in Europa: Adidas (~6%-Anteil), Aston Villa FC. Investiert hauptsächlich in Industrie und Sportbusiness, weniger in Tech. Ein Beweis, dass Frontier-Markets-Investoren global mithalten können.</div>
          </div>
          <div style={{ background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 14, padding: '16px 24px' }}>

          <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.8, marginBottom: 28 }}>
            Inflation entwertet dein Erspartes — still, stetig, ohne Steuerbescheid. <strong style={{ color: 'var(--text)' }}>100 €</strong> aus dem Jahr 2000 haben heute nur noch eine Kaufkraft von etwa <strong style={{ color: 'var(--red)' }}>60 €</strong>. Wer Geld auf dem Girokonto oder Sparbuch liegen lässt, verliert jedes Jahr real an Vermögen. Die Europäische Zentralbank hat seit 2008 die Geldmenge im Euroraum mehr als verdreifacht — mehr Geld im System bedeutet: jeder einzelne Euro wird weniger wert.
          </div>

          {/* M3 + Kaufkraft side by side */}
          <div className="resp-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32, marginBottom: 28 }}>
            {/* Geldmenge M3 Chart */}
            <div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--text)', marginBottom: 8 }}>Geldmenge im Euroraum (M3)</div>
              <div style={{ fontSize: 14, color: 'var(--text-dim)', marginBottom: 20, lineHeight: 1.6 }}>
                M3 misst alles Geld im Umlauf — Bargeld, Girokonten, Spareinlagen.
                Je mehr Geld im System ist, desto weniger ist jeder einzelne Euro wert.
              </div>
              {(() => {
                const data = [
                  { year: 1999, value: 4.7 },
                  { year: 2004, value: 6.4 },
                  { year: 2008, value: 9.4 },
                  { year: 2012, value: 9.8 },
                  { year: 2016, value: 11.3 },
                  { year: 2020, value: 14.4 },
                  { year: 2022, value: 16.1 },
                  { year: 2024, value: 16.6 },
                ];
                const chartW = 480;
                const chartH = 180;
                const padL = 40;
                const padR = 16;
                const padT = 16;
                const padB = 28;
                const w = chartW - padL - padR;
                const h = chartH - padT - padB;
                const minVal = 0;
                const maxVal = 18;
                const points = data.map((d, i) => {
                  const x = padL + (i / (data.length - 1)) * w;
                  const y = padT + h - ((d.value - minVal) / (maxVal - minVal)) * h;
                  return { x, y, year: d.year, val: d.value, pandemic: d.year >= 2020 };
                });
                const line = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
                const area = line + ` L${points[points.length-1].x},${padT + h} L${points[0].x},${padT + h} Z`;
                return (
                  <svg viewBox={`0 0 ${chartW} ${chartH}`} style={{ width: '100%', height: 'auto' }}>
                    <defs>
                      <linearGradient id="vrM3Grad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="var(--red)" stopOpacity="0.3"/>
                        <stop offset="100%" stopColor="var(--red)" stopOpacity="0"/>
                      </linearGradient>
                    </defs>
                    <path d={area} fill="url(#vrM3Grad)" />
                    <path d={line} fill="none" stroke="var(--red)" strokeWidth="2.5" />
                    {points.map((p) => (
                      <g key={p.year}>
                        <circle cx={p.x} cy={p.y} r={3.5} fill="var(--red)" />

                          {p.val}
                        </text>
                        <text x={p.x} y={padT + h + 16} textAnchor="middle"
                          fill="var(--text-dim)" fontSize="10">{p.year}</text>
                      </g>
                    ))}
                  </svg>
                );
              })()}
              <div style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 8 }}>

                          {p.year}
                        </text>
                      </g>
                    ))}
                  </svg>
                );
              })()}

        <div style={{ marginTop: 48, paddingTop: 32, borderTop: '1px solid var(--border)' }}>
          <h2 style={{ fontSize: 18, fontFamily: 'var(--sans)', color: 'var(--text)', fontWeight: 600, lineHeight: 1.5, marginBottom: 16 }}>Warum du selbst für deine Altersvorsorge sorgen musst</h2>
          <div style={{ fontSize: 15, color: 'var(--text-dim)', lineHeight: 1.9, display: 'flex', flexDirection: 'column', gap: 14 }}>
            <p style={{ margin: 0 }}>Die gesetzliche Rente in Deutschland steht vor einem strukturellen Problem: Immer weniger Beitragszahler finanzieren immer mehr Rentner. Das Rentenniveau sinkt seit Jahren, während die Beiträge steigen. Wer sich allein auf die staatliche Rente verlässt, riskiert Altersarmut — besonders Selbständige, Freelancer und Geringverdiener. Privat vorsorgen ist keine Option mehr, sondern Notwendigkeit.</p>
            <p style={{ margin: 0 }}>Doch der Staat macht es Privatanlegern nicht leicht. Kapitalerträge werden mit der Abgeltungssteuer von 25% plus Solidaritätszuschlag und ggf. Kirchensteuer belastet — effektiv bis zu 28%. Wer mit ETFs, Aktien oder Fonds fürs Alter spart, gibt über ein Viertel seiner Gewinne ab. Dazu kommen intransparente Gebührenstrukturen bei Banken und Versicherungen, die langfristig zehntausende Euro an Rendite kosten. Die Riester-Rente, einst als Lösung beworben, enttäuscht die meisten Sparer durch hohe Kosten und magere Ergebnisse. Die betriebliche Altersvorsorge klingt attraktiv, bindet aber Kapital und ist in der Auszahlungsphase voll steuerpflichtig.</p>
            <p style={{ margin: 0 }}>Eigenverantwortliches Investieren — mit einem klaren Plan, niedrigen Kosten und langfristigem Horizont — ist der effektivste Weg zum Vermögensaufbau. Ein breit diversifiziertes Portfolio aus Welt-ETFs, ergänzt durch Gold, Bitcoin und Cash, kann über Jahrzehnte ein erhebliches Vermögen aufbauen. Der Zinseszinseffekt ist dabei der mächtigste Verbündete: Wer früh anfängt und konsequent investiert, profitiert exponentiell. Schon 500 Euro monatlich in einen kostengünstigen Indexfonds können über 30 Jahre zu einem sechsstelligen Vermögen anwachsen.</p>
            <p style={{ margin: 0 }}>Die größten Fehler dabei: zu spät anfangen, zu viel für Gebühren bezahlen, und zu oft das Portfolio umschichten. Studien zeigen, dass Anleger, die einen einfachen Sparplan aufsetzen und ihn laufen lassen, langfristig besser abschneiden als die meisten aktiv gemanagten Fonds. Geld anlegen muss nicht kompliziert sein — aber es muss passieren. Jeder Monat ohne Investment ist verlorene Zeit, in der der Zinseszins nicht für dich arbeitet.</p>
            <p style={{ margin: 0 }}>Dieser Vermögensrechner hilft dir, die Mathematik hinter dem langfristigen Investieren zu verstehen. Berechne dein Endvermögen, vergleiche verschiedene Renditen und Sparraten, und sieh selbst, wie aus kleinen monatlichen Beträgen über Zeit echtes Vermögen entsteht. Geldanlage, Altersvorsorge und finanzielle Unabhängigkeit beginnen mit einer einzigen Entscheidung: heute anfangen.</p>
