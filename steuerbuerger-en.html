                    Withdrawal plan · How long does the capital last?
                  </div>
                  <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.6, marginBottom: 16 }}>
                    If from year {oppYears} you withdraw your current net salary ({fmt(annualNet)} €/year, inflation-adjusted) annually and the rest continues to earn {oppInterest}% return:
                  </div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 42, fontWeight: 500, color: 'var(--gold)', lineHeight: 1 }}>
                    {infiniteWithdraw ? '∞' : withdrawYears} {infiniteWithdraw ? '' : 'years'}

                  <div style={{ fontSize: 13, color: 'var(--text-dim)', marginTop: 8, lineHeight: 1.6 }}>
                    {infiniteWithdraw
                      ? 'The capital lasts indefinitely — the return exceeds the inflation-adjusted withdrawal.'
                      : `After ${withdrawYears} years of withdrawals, the capital would be depleted. This corresponds to a total period of ${oppYears + withdrawYears} years (${oppYears}yr saving phase + ${withdrawYears}yr withdrawal).`
                    }
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--text-dim)', marginTop: 12, padding: '10px 14px', background: 'rgba(241,196,15,0.08)', borderRadius: 8, lineHeight: 1.6 }}>
                    <strong style={{ color: 'var(--gold)' }}>Note:</strong> The withdrawal is increased annually by {oppInflation}% to offset inflation. In the first withdrawal year you withdraw {fmt(Math.round(annualNet * Math.pow(1 + inflRate, oppYears)))} €, in the last {!infiniteWithdraw && withdrawYears > 0 ? `${fmt(Math.round(annualNet * Math.pow(1 + inflRate, oppYears + withdrawYears - 1)))} €` : '—'} — so purchasing power always remains at your current net salary level.
                  </div>
                </div>

                <div style={{ padding: '18px 22px', background: 'var(--bg2)', borderRadius: 10, border: '1px solid var(--border)', fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.7 }}>
                  <strong style={{ color: 'var(--text)' }}>For comparison:</strong>{' '}
                  Instead, over {oppYears} years you pay <strong style={{ color: 'var(--red)' }}>{fmt(totalPaid)} €</strong> to the state — financing a pension promise (whether it will still be honored in {oppYears} years, nobody knows), basic welfare, infrastructure (roads, rail, digital), research, energy transition — but also military, debt interest, and EU transfers.
                  This is not about abolishing taxes, but about illustrating the <strong style={{ color: 'var(--text)' }}>opportunity cost</strong>. Whether it is a good deal is up to you.
                </div>
              </div>

              <div>
                <div style={{ fontSize: 12, fontFamily: 'var(--mono)', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 12 }}>
                  Saving phase ({oppYears}yr) + Withdrawal ({infiniteWithdraw ? '∞' : `${wdDisplayYears}yr`})
                </div>
                <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ overflow: 'visible' }}>
                  <defs>
                    <linearGradient id="oppGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="var(--green)" stopOpacity="0.2" />
                      <stop offset="100%" stopColor="var(--green)" stopOpacity="0" />
                    </linearGradient>
                    <linearGradient id="wdGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="var(--gold)" stopOpacity="0.15" />
                      <stop offset="100%" stopColor="var(--gold)" stopOpacity="0" />
                    </linearGradient>
                  </defs>
                  {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
                    const v = Math.round(maxVal * f / 10000) * 10000;
                    return (
                      <g key={i}>
                        <line x1={pad.left} x2={w - pad.right} y1={yS(v)} y2={yS(v)} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />
                        <text x={pad.left - 6} y={yS(v) + 4} fill="#555" fontSize="10" textAnchor="end">
                          {v >= 1000000 ? `${(v / 1000000).toFixed(1)}M` : `${(v / 1000).toFixed(0)}k`}
                        </text>
                      </g>
                    );
                  })}
                  {/* X-axis ticks for full range */}
                  {Array.from({ length: chartTotalYears + 1 }, (_, i) => {
                    const step = chartTotalYears <= 10 ? 1 : chartTotalYears <= 20 ? 2 : chartTotalYears <= 40 ? 5 : 10;
                    return (i % step === 0 || i === chartTotalYears) && <text key={i} x={xS(i)} y={h - 4} fill="#555" fontSize="10" textAnchor="middle">{i}yr</text>;

                <strong style={{ color: 'var(--text)' }}>"Sondervermögen" (special fund)</strong> sounds like wealth — like a pot of money the state provides for us. In reality, a Sondervermögen is the exact opposite: it is <strong style={{ color: 'var(--red)' }}>special debt</strong>. The state takes out loans that bypass the regular budget and the debt brake (Schuldenbremse). The repayment — including interest — is borne by future taxpayers.
              </p>
              <p style={{ margin: '0 0 14px' }}>
                <strong style={{ color: 'var(--text)' }}>"Special programs"</strong> follow the same logic: what is marketed as targeted investment is credit-financed spending policy. Whether EU recovery funds or national stimulus packages — in the end there is a liability, not an asset.

            </div>
            <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 10, opacity: 0.6 }}>Theory: <a href="https://en.wikipedia.org/wiki/Progress_and_Poverty" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--text-dim)' }}>Henry George — "Progress and Poverty" (1879)</a> · <a href="https://en.wikipedia.org/wiki/Georgism" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--text-dim)' }}>Georgism</a></div>

            <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 10, opacity: 0.6 }}>Theory: <a href="https://en.wikipedia.org/wiki/Pigouvian_tax" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--text-dim)' }}>Arthur Pigou — Pigouvian Tax (1920)</a> · Partially implemented: CO₂ price, tobacco tax</div>

            <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 10, opacity: 0.6 }}><a href="https://en.wikipedia.org/wiki/The_Denationalization_of_Money" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--text-dim)' }}>Friedrich Hayek — "Denationalisation of Money" (1976)</a> · <a href="https://en.wikipedia.org/wiki/Friedrich_Hayek" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--text-dim)' }}>Nobel Prize in Economics 1974</a></div>

        </div>

        <div style={{ fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7, maxWidth: 720, fontStyle: 'italic' }}>
          All of these models have pros and cons — none is perfect. But they show: there are alternatives to a system
          that punishes labor and devalues savings. The question is not whether, but when we are ready to think differently.
        </div>
      </section>

      {/* SECTION: ACTIONS */}
      <section id="actions">
        <div className="section-label">Your levers</div>
        <h2>Until the system changes:<br /><span className="green">What you can do today.</span></h2>
        <div style={{ marginBottom: 48, fontSize: 16, color: 'var(--text-dim)', lineHeight: 1.7, maxWidth: 720 }}>
          System change takes time. Your money does not wait. Here are the most effective levers you can already use.
        </div>

        <div className="resp-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20, marginBottom: 20 }}>
          <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 16, padding: 24, border: '1px solid rgba(255,255,255,0.06)' }}>
            <div style={{ fontSize: 28, marginBottom: 10 }}>🧠</div>
            <h4 style={{ fontSize: 15, marginBottom: 8 }}>Invest in yourself</h4>
            <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6 }}>
              Understanding how taxes, inflation, and monetary policy work — which is what you are doing right now. Plus: further education, new skills, career changes. Salary increases through human capital beat any savings rate in the long run.
            </div>
          </div>
          <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 16, padding: 24, border: '1px solid rgba(255,255,255,0.06)' }}>
            <div style={{ fontSize: 28, marginBottom: 10 }}>📈</div>
            <h4 style={{ fontSize: 15, marginBottom: 8 }}>Build wealth</h4>
            <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6 }}>
              Money in the bank is guaranteed to lose value. Broadly diversified ETFs have historically returned ~7–8% p.a. Even better: your own company (GmbH), real estate with depreciation, equity stakes — productive assets instead of just passive saving.
            </div>
          </div>
          <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 16, padding: 24, border: '1px solid rgba(255,255,255,0.06)' }}>
            <div style={{ fontSize: 28, marginBottom: 10 }}>🧾</div>
            <h4 style={{ fontSize: 15, marginBottom: 8 }}>Optimize your tax burden</h4>
            <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6 }}>
              Maximize allowances, deductible expenses, commuter flat rate. For more: GmbH structure (~30% instead of 42%+). Even more radical: geo-arbitrage — work remotely, tax residence in Portugal, Dubai, or Georgia.
            </div>
          </div>
        </div>

        <div className="resp-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20 }}>
          <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 16, padding: 24, border: '1px solid rgba(255,255,255,0.06)' }}>
            <div style={{ fontSize: 28, marginBottom: 10 }}>₿</div>
            <h4 style={{ fontSize: 15, marginBottom: 8 }}>Deflationary saving</h4>
            <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6 }}>
              Bitcoin has a fixed supply of 21 million — the only currency whose supply cannot be politically manipulated. Controversial, but a counterproposal to money supply expansion.
              Gold as a classic inflation hedge for millennia.
            </div>
          </div>
          <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 16, padding: 24, border: '1px solid rgba(255,255,255,0.06)' }}>
            <div style={{ fontSize: 28, marginBottom: 10 }}>🤝</div>
            <h4 style={{ fontSize: 15, marginBottom: 8 }}>Network economy</h4>
            <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6 }}>
              Trading, sharing, local economic circuits. Not everything needs to go through the taxable monetary system — neighborhood help, co-ops, skill sharing.
            </div>
          </div>
          <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 16, padding: 24, border: '1px solid rgba(255,255,255,0.06)' }}>
            <div style={{ fontSize: 28, marginBottom: 10 }}>🔍</div>
            <h4 style={{ fontSize: 15, marginBottom: 8 }}>Demand transparency</h4>
            <div style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.6 }}>
              Vote, question budgets, support initiatives like the Taxpayers' Federation (Bund der Steuerzahler). Those who know where the money goes can make better decisions.
            </div>
          </div>
        </div>

        <div style={{ marginTop: 40, fontSize: 14, color: 'var(--text-dim)', lineHeight: 1.7, maxWidth: 720, fontStyle: 'italic' }}>
          Not financial advice. Every situation is individual. But doing nothing is also a decision — and the most expensive one.
        </div>
      </section>

      <footer className="footer">
        <div className="footer-note">
          Calculation based on federal budget 2024 (476.81 bn. €), EStG §32a as amended by Tax Development Act 2024 (basic allowance 11,784 €), contribution rates 2024 (health ins. 8.15% employee share incl. avg. supplementary contribution, care ins. 2.3% childless, pension ins. 9.3%, unempl. ins. 1.3%). Contribution ceilings: health/care ins. 62,100 €/yr, pension/unempl. ins. 90,600 €/yr. Solidarity surcharge with mitigation zone (§4 SolZG, threshold 18,130 €). Tax class 1, no children, no church tax. VAT calculation using standard rate 19% (reduced rate 7% not considered). EU net balance per operational budget balance (Bundesbank). Figures are for illustration purposes.
          <div style={{ marginTop: 14, display: 'flex', flexWrap: 'wrap', gap: '6px 20px' }}>
            {[
              { label: 'Federal Budget 2024 (interactive)', url: 'https://www.bundeshaushalt.de' },
              { label: 'Bundestag — Budget 2024 (476.81 bn.)', url: 'https://www.bundestag.de/dokumente/textarchiv/2024/kw05-de-haushaltsgesetz-2024-finanzplan-977680' },
              { label: 'EStG §32a (Income Tax Tariff)', url: 'https://www.gesetze-im-internet.de/estg/__32a.html' },
              { label: 'Income Tax Tariff 2024 (Formulas)', url: 'https://www.lohn-info.de/einkommensteuertarif_2024.html' },
              { label: 'Social Insurance Contributions 2024', url: 'https://www.lohn-info.de/sozialversicherungsbeitraege2024.html' },
              { label: 'Solidarity Surcharge (Mitigation Zone)', url: 'https://www.haufe.de/id/beitrag/solidaritaetszuschlag-zur-einkommensteuer-32-milderungszone-HI14712447.html' },
              { label: 'Bundesbank — EU Budget 2024', url: 'https://www.bundesbank.de/de/aufgaben/themen/monatsbericht-zum-eu-haushalt-2024-deutschland-weiterhin-nettozahler-aber-kein-spitzenreiter-967478' },
              { label: 'bpb — EU Net Contributors', url: 'https://www.bpb.de/kurz-knapp/zahlen-und-fakten/europa/70580/nettozahler-und-nettoempfaenger-in-der-eu/' },
              { label: 'Bundeswehr Special Fund (BMF)', url: 'https://www.bundesfinanzministerium.de/Content/DE/Standardartikel/Themen/Schlaglichter/Sondervermoegen-Bundeswehr/sondervermoegen-bundeswehr.html' },
              { label: 'Debt Level (Bundesbank)', url: 'https://www.bundesbank.de/de/statistiken/oeffentliche-finanzen' },
              { label: 'BMF — Target Report 2024', url: 'https://www.bundesfinanzministerium.de/Monatsberichte/Ausgabe/2024/02/Inhalte/Kapitel-3-Analysen/3-1-sollbericht-2024.html' },

              { label: 'Ukraine Loan 90 bn. (Council)', url: 'https://www.consilium.europa.eu/en/press/press-releases/2026/04/23/council-finalises-90-billion-support-loan-to-ukraine/' },
              { label: 'SAFE 150 bn. (EU Representation DE)', url: 'https://germany.representation.ec.europa.eu/news/eu-mitgliedstaaten-billigen-150-milliarden-euro-fur-safe-verteidigungsdarlehenspaket-2025-05-27_de' },
              { label: 'NextGenerationEU (EU Commission)', url: 'https://commission.europa.eu/strategy-and-policy/recovery-plan-europe_en' },
              { label: 'ReArm Europe / White Paper (EU Representation DE)', url: 'https://germany.representation.ec.europa.eu/news/zur-zukunft-der-europaischen-verteidigung-weissbuch-und-rearm-europe-2025-03-19_de' },
            ].map((s, i) => (
              <a key={i} href={s.url} target="_blank" rel="noopener noreferrer"
                style={{ color: 'var(--text-dim)', fontSize: 11, fontFamily: 'var(--mono)', textDecoration: 'none', borderBottom: '1px solid var(--border)', paddingBottom: 1, transition: 'color 0.15s' }}
                onMouseEnter={e => e.target.style.color = 'var(--text)'}
                onMouseLeave={e => e.target.style.color = 'var(--text-dim)'}
              >{s.label} ↗</a>
            ))}
          </div>
        </div>
        <div className="footer-year mono" style={{ fontSize: 11 }}>As of: Federal budget target 2024 · Tax tariff 2024 (StFEG)</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
